    mppt_voc_max_custom: "", hsp_manual: "", temp_min_manual: "",
    perdidas_manual: "", margen_manual: "", tension_banco_manual: "", demanda_max_kw: "",
  });
  const sf = (k, v) => {
    setForm(f => ({ ...f, [k]: v }));
    if (formErrors[k]) setFormErrors(e => { const n={...e}; delete n[k]; return n; });
  };

  // ── Form Validation ────────────────────────────────────────────────────────
  const validateForm = () => {
    const errors = {};
    if (!form.consumo_mensual_kwh || Number(form.consumo_mensual_kwh) <= 0) errors.consumo_mensual_kwh = "Ingrese un consumo válido (> 0 kWh)";
    if (!form.precio_kwh_cop || Number(form.precio_kwh_cop) <= 0) errors.precio_kwh_cop = "Ingrese una tarifa válida (> 0 COP)";
    if (!form.region || form.region.trim().length < 2) errors.region = "Ingrese la ciudad o región";
    if (form.tipo_sistema !== "on-grid" && (!form.dias_autonomia || Number(form.dias_autonomia) < 1)) errors.dias_autonomia = "Días de autonomía debe ser ≥ 1";
    return errors;
  };

  // ── Load Template ──────────────────────────────────────────────────────────
  const loadTemplate = (tpl) => {
    setForm(f => ({ ...f, ...tpl.values }));
    setShowTemplates(false);
    setResults(null);
    setView("calc");
    setFormErrors({});
  };

  // ── Share by Link ──────────────────────────────────────────────────────────
  const generateShareLink = () => {
    try {
      const payload = { form };
      const encoded = btoa(encodeURIComponent(JSON.stringify(payload)));
      const url = window.location.href.split("#")[0] + "#share=" + encoded;
      setShareUrl(url);
      setShowShare(true);
      setShareCopied(false);
    } catch(e) { alert("Error generando el enlace."); }
  };

  const copyShareUrl = () => {
    navigator.clipboard.writeText(shareUrl).then(() => { setShareCopied(true); setTimeout(() => setShareCopied(false), 2500); }).catch(() => {
      try { const ta = document.createElement("textarea"); ta.value = shareUrl; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); setShareCopied(true); setTimeout(() => setShareCopied(false), 2500); } catch(e){}
    });
  };

  // Load shared project from URL hash on init
  useEffect(() => {
    const hash = window.location.hash;
    if (hash.startsWith("#share=")) {
      try {
        const decoded = JSON.parse(decodeURIComponent(atob(hash.slice(7))));
        if (decoded.form) { setForm(f => ({ ...f, ...decoded.form })); setView("calc"); }
      } catch(e){}
    }
  }, []);

  // ── PDF Export ─────────────────────────────────────────────────────────────
  const exportPDF = () => {
    if (!results) return;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
    const s = results.summary;
    const W = doc.internal.pageSize.getWidth();   // 210 mm
    const H = doc.internal.pageSize.getHeight();  // 297 mm
    const ML = 14, MR = 14;                       // left / right margins
    const usableW = W - ML - MR;                  // 182 mm usable
    const FOOTER_H = 14;
    const MAX_Y = H - FOOTER_H - 4;              // last usable y before footer
    let y = 0;

    /* ── helpers ── */
    const safeText = (raw) => String(raw ?? "—").replace(/\u2019/g,"'").replace(/[\u2018\u201c\u201d]/g,'"');
    const txt = (text, x, yy, opts={}) => {
      doc.setFontSize(opts.size || 9);
      doc.setFont("helvetica", opts.bold ? "bold" : "normal");
      doc.setTextColor(...(opts.color || [50,50,50]));
      const t = safeText(text);
      if (opts.maxW) {
        const lines = doc.splitTextToSize(t, opts.maxW);
        doc.text(lines, x, yy, opts.align ? {align:opts.align} : undefined);
        return lines.length;
      }
      doc.text(t, x, yy, opts.align ? {align:opts.align} : undefined);
      return 1;
    };
    const newPage = () => {
      addFooter();
      doc.addPage();
      y = 14;
    };
    const checkPage = (needed = 12) => { if (y + needed > MAX_Y) newPage(); };
    const sectionBar = (title) => {
      checkPage(14);
      doc.setFillColor(15,35,64); doc.rect(ML, y, usableW, 7, "F");
      doc.setFillColor(245,158,11); doc.rect(ML, y+7, usableW, 1.2, "F");
      txt(title, ML+3, y+5, {size:8.5, bold:true, color:[255,255,255]});
      y += 11;
    };
    const addFooter = () => {
      const pg = doc.internal.getNumberOfPages();
      doc.setFillColor(240,242,246); doc.rect(0, H-FOOTER_H, W, FOOTER_H, "F");
      doc.setDrawColor(200,210,225); doc.line(0, H-FOOTER_H, W, H-FOOTER_H);
      txt("SolarMind Designer Pro — Informe estimativo generado automaticamente.", ML, H-5, {size:6.5, color:[140,140,140]});
      txt(`Pagina ${pg}`, W-MR, H-5, {size:6.5, color:[140,140,140], align:"right"});
    };

    /* ══════════════════════════════════════════════
       PAGE 1 — HEADER
    ══════════════════════════════════════════════ */
    // Dark header bar
    doc.setFillColor(12,28,55); doc.rect(0,0,W,32,"F");
    doc.setFillColor(245,158,11); doc.rect(0,30,W,2.5,"F");

    // Logo (top-right, inside header)
    try {
      const logoSrc = window.LOGO_SRC;
      if (logoSrc && logoSrc.startsWith("data:image")) {
        doc.addImage(logoSrc, "PNG", W-46, 2, 32, 27, undefined, "FAST");
      }
    } catch(e){}

    // Header text
    txt("SolarMind Designer Pro", ML, 13, {size:17, bold:true, color:[255,255,255]});
    txt("Informe de Dimensionamiento Fotovoltaico", ML, 21, {size:8.5, color:[160,190,230]});
    txt(new Date().toLocaleDateString("es-CO",{year:"numeric",month:"long",day:"numeric"}), W-MR, 21, {size:7.5, color:[180,210,240], align:"right"});
    y = 38;

    /* ── Project info card ── */
    doc.setFillColor(246,248,252); doc.rect(ML, y, usableW, 22, "F");
    doc.setDrawColor(210,220,235); doc.rect(ML, y, usableW, 22, "S");
    // left column
    txt("PROYECTO", ML+4, y+6, {size:6.5, bold:true, color:[120,120,130]});
    txt(form.nombre_proyecto || "Proyecto Solar", ML+4, y+13.5, {size:11, bold:true, color:[12,28,55], maxW: usableW/2-8});
    // right column
    const rx2 = ML + usableW/2 + 4;
    txt("CLIENTE", rx2, y+6, {size:6.5, bold:true, color:[120,120,130]});
    txt(form.nombre_cliente || "—", rx2, y+13.5, {size:10, color:[12,28,55], maxW: usableW/2-8});
    // subtitle row
    const region = s.inputs?.region || form.region || "—";
    const tipo = (s.inputs?.tipo_sistema || form.tipo_sistema || "").toUpperCase();
    txt(`Region: ${region}   |   Sistema: ${tipo}   |   Cobertura: ${Math.round((form.porcentaje_cobertura||1)*100)}%`, ML+4, y+20, {size:7, color:[130,130,150]});
    y += 28;

    /* ── KPI grid (2 rows × 3 cols) ── */
    const kpis = [
      {l:"kWp Instalado", v:s.kwp_inst, u:"kWp"},
      {l:"Paneles", v:`${s.n_paneles} u (${s.n_serie}S x ${s.n_par}P)`, u:"config"},
      {l:"CAPEX Total", v:`$${fmtM(s.capex)}`, u:"COP estimado"},
      {l:"Ahorro estimado/ano", v:`$${fmt(s.ah_ano)}`, u:"COP/ano"},
      {l:"Payback simple", v:s.payback, u:"anos"},
      {l:"Tension banco DC", v:`${s.v_bat} V`, u:"DC"},
    ];
    const kBoxW = (usableW - 8) / 3;
    const kBoxH = 18;
    kpis.forEach((k, i) => {
      const kx = ML + (i%3) * (kBoxW + 4);
      const ky = y + Math.floor(i/3) * (kBoxH + 3);
      doc.setFillColor(255,249,236); doc.rect(kx, ky, kBoxW, kBoxH, "F");
      doc.setDrawColor(240,175,50); doc.rect(kx, ky, kBoxW, kBoxH, "S");
      txt(k.l, kx+3, ky+6, {size:6.5, color:[130,100,20]});
      txt(String(k.v), kx+3, ky+13, {size:9.5, bold:true, color:[170,90,0], maxW: kBoxW-6});
      txt(k.u, kx+kBoxW-3, ky+13, {size:6, color:[170,130,60], align:"right"});
    });
    y += (kBoxH+3)*2 + 6;

    /* ══════════════════════════════════════════════

    if (!results) return;

    if (!key) {

      return;
    }
    setLlmLoading(true); setLlmResult(null);
    // Leer siempre de `form` (estado actual) — correcto tanto para cálculo nuevo como proyecto cargado
    const tipo   = form.tipo_sistema || "off-grid";
    const region = form.region || "Colombia";
    const consumo = form.consumo_mensual_kwh || 150;
    const cobertura = Math.round((form.porcentaje_cobertura || 1) * 100);

    const s  = results.summary;
    const cd = s.capex_detail || {};

    const systemPrompt = `Eres SolarMind AI, un ingeniero fotovoltaico certificado con 15 años de experiencia en Colombia y Latinoamérica. Conoces RETIE, UPME y condiciones climáticas colombianas. Generas informes técnico-comerciales profesionales para instaladoras de energía solar.
REGLAS: Responde ÚNICAMENTE con JSON válido sin markdown ni backticks. Mínimo 150 palabras por sección. Referencias a RETIE/UPME donde aplique.`;

    const userPrompt = `Genera un informe técnico-comercial completo con estos datos del sistema solar:

SISTEMA: Tipo=${tipo} | Región=${region} | Consumo=${consumo} kWh/mes | Cobertura=${cobertura}%
ARREGLO: ${s.kwp_inst} kWp instalados (req. ${s.kwp_final}) | ${s.n_paneles} paneles ${s.panel_name} ${s.panel_wp}Wp | Config ${s.n_serie}S×${s.n_par}P | Voc frío=${s.voc_str}V | Vmp=${s.vmp_str}V
ELÉCTRICO: VDC=${s.v_bat}V | IMPPT=${s.i_mppt_req}A | Inversor=${s.p_inv}kW | Cable=${s.s_norm}mm² | HSP=${s.hsp}h/día | Tmin=${s.temp_min}°C
ECONÓMICO: Ahorro anual=$${fmt(s.ah_ano)} COP | CAPEX=$${fmt(s.capex)} COP | Payback=${s.payback}años | ROI10a=${((s.ah_ano*10-s.capex)/s.capex*100).toFixed(1)}%
CAPEX DETALLE: Paneles=$${fmt(cd.paneles||0)} | MPPT=$${fmt(cd.mppt||0)} | Inversor=$${fmt(cd.inversor||0)} | Baterías=$${fmt(cd.baterias||0)} | Estructura=$${fmt(cd.estructura||0)} | Cables=$${fmt(cd.otros||0)} | MO=$${fmt(cd.mano_obra||0)}

Devuelve EXACTAMENTE este JSON (sin nada más antes ni después):
{"resumen":"[200-250 palabras ejecutivas con KPIs narrativos y beneficios para el cliente]","evaluacion_tecnica":"[250-300 palabras: validación dimensionamiento, strings, RETIE, región climática]","analisis_economico":"[200-250 palabras: CAPEX, payback Colombia, proyección 25 años con inflación tarifaria 10% anual]","recomendaciones":"[6-8 recomendaciones técnicas accionables con justificación]","riesgos":"[Riesgos técnicos, regulatorios y financieros con probabilidad e impacto]","propuesta_comercial":"[180-220 palabras persuasivas para enviar al cliente con llamada a la acción]","cronograma":"[5-7 fases de implementación con duración estimada]","mantenimiento":"[Plan trimestral, semestral y anual de mantenimiento preventivo]"}`;

    // Groq modelos gratuitos en orden de preferencia
    const MODELS = [
      "llama-3.3-70b-versatile",
      "llama-3.1-8b-instant",
      "gemma2-9b-it",
    ];

    const errors = [];
    for (const model of MODELS) {
      try {
        const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${key}`
          },
          body: JSON.stringify({
            model,
            temperature: 0.4,
            max_tokens: 4096,
            messages: [
              { role: "system", content: systemPrompt },
              { role: "user", content: userPrompt }
            ]
          })
        });

        if (data.error) {
          const msg = String(data.error.message || data.error.type || "error desconocido");
          errors.push(`${model}: ${msg.slice(0, 100)}`);
          if (resp.status === 429 || msg.includes("rate") || msg.includes("limit")) continue;
          throw new Error(msg);
        }
        const raw = data.choices?.[0]?.message?.content || "";
        const clean = raw.replace(/```json\n?|```\n?/g, "").trim();
        const i1 = clean.indexOf("{"), i2 = clean.lastIndexOf("}");

    if (i.id !== id) return i;

    if (["qty", "unit_price"].includes(field)) u.total = u.qty * u.unit_price;
    return u;
  }));
  const qSub = quoteItems.reduce((a, i) => a + i.total, 0);

            {[

              ["Las barras SUPERAN la línea azul","Su sistema genera más energía de la que consume ese mes. El excedente puede venderse a la red (On-Grid) o almacenarse en baterías (Off/Híbrido). Es un mes muy rentable."],
              ["Las barras IGUALAN la línea azul","El sistema cubre exactamente su consumo. Situación ideal de dimensionamiento."],
              ["Las barras están POR DEBAJO de la línea","El sistema no alcanza a cubrir todo su consumo ese mes (meses con menor radiación solar). Necesitará complementar con red eléctrica o aumentar el kWp instalado."],
              ["Variación estacional","Los meses con barras más altas corresponden a épocas de mayor radiación solar en su región. En Colombia, los meses de enero-marzo y julio-agosto suelen tener más sol que abril-junio."],
            ].map(([t,d])=>(
              <div key={t} style={{display:"flex",gap:".6rem",marginBottom:".45rem",paddingBottom:".45rem",borderBottom:"1px solid var(--border)"}}>
                <div style={{fontSize:".78rem",fontWeight:700,color:"var(--accent-dark)",minWidth:200,flexShrink:0}}>▸ {t}:</div>
                <div style={{fontSize:".77rem",color:"var(--text2)",lineHeight:1.5}}>{d}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Chart 2 explanation */}
        <div style={{marginBottom:"1.25rem",paddingTop:"1rem",borderTop:"1px solid var(--border)"}}>
          <div style={{fontSize:".85rem",fontWeight:700,color:"var(--green)",marginBottom:".5rem",display:"flex",alignItems:"center",gap:".4rem"}}>📈 Gráfica 2: Flujo de caja acumulado (15 años)</div>
          <p style={{fontSize:".81rem",lineHeight:1.75,color:"var(--text2)"}}>
            Esta gráfica muestra el <strong style={{color:"var(--text)"}}>balance financiero acumulado</strong> del proyecto año tras año. Se parte desde el valor negativo del CAPEX (año 0 = inversión inicial) y se va sumando el ahorro anual estimado en energía eléctrica.
          </p>
          <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:".75rem",marginTop:".4rem"}}>
            {[
              ["Barras ROJAS (valores negativos)","El sistema aún no ha recuperado la inversión. Está en período de payback. Es completamente normal durante los primeros años."],
              ["Barras VERDES (valores positivos)","¡El sistema ya recuperó su inversión! A partir de aquí todo es ganancia neta. Las barras verdes representan rentabilidad pura."],
              ["La línea amarilla (Break-even)","Es el punto de equilibrio (cero). El año en que las barras cruzan de rojo a verde es su Payback: el tiempo exacto en que recupera la inversión."],
              ["Proyección a 15 años","Los paneles duran 25+ años. Una vez pagada la inversión (ej. año 8), los siguientes 17+ años generan retorno neto puro. El sistema sigue trabajando para usted sin costo adicional."],
            ].map(([t,d])=>(
              <div key={t} style={{display:"flex",gap:".6rem",marginBottom:".45rem",paddingBottom:".45rem",borderBottom:"1px solid var(--border)"}}>
                <div style={{fontSize:".78rem",fontWeight:700,color:"var(--green)",minWidth:200,flexShrink:0}}>▸ {t}:</div>
                <div style={{fontSize:".77rem",color:"var(--text2)",lineHeight:1.5}}>{d}</div>
              </div>
            ))}
          </div>
          <div className="alert alert-info" style={{marginTop:".65rem",fontSize:".76rem"}}>
            💡 <strong>Nota importante:</strong> Esta proyección usa una tarifa fija. En la realidad, las tarifas eléctricas en Colombia han aumentado en promedio un 8–12% anual en la última década, lo que hace que el retorno real sea <strong>considerablemente mejor</strong> que lo mostrado aquí.
          </div>
        </div>

        {/* Chart 3 explanation */}
        <div style={{paddingTop:"1rem",borderTop:"1px solid var(--border)"}}>
          <div style={{fontSize:".85rem",fontWeight:700,color:"var(--purple)",marginBottom:".5rem",display:"flex",alignItems:"center",gap:".4rem"}}>🥧 Gráfica 3: Distribución del CAPEX</div>
          <p style={{fontSize:".81rem",lineHeight:1.75,color:"var(--text2)"}}>
            El gráfico de dona muestra en qué se distribuye su inversión total. Cada segmento representa un componente del sistema con su porcentaje del total. Esta visualización le ayuda a identificar los componentes de mayor peso económico y a priorizar donde buscar mejores precios o alternativas.
          </p>
          <div className="alert alert-warn" style={{marginTop:".65rem",fontSize:".76rem"}}>
            ⚠️ <strong>Sobre los valores económicos:</strong> Todos los montos del CAPEX son <strong>estimaciones de referencia</strong> basadas en precios típicos del mercado colombiano. Los valores reales dependerán del proveedor, la marca exacta del equipo, costos de transporte, región de instalación y condiciones del contrato. Solicite siempre cotizaciones formales a instaladores certificados.
          </div>
        </div>
      </div>}

      {/* SUMMARY */}
      {tab === "summary" && <>
        <div className="kpi-grid">
          <KPI val={s.kwp_inst} unit="kWp" label="Potencia instalada" color="var(--accent)" />
          <KPI val={s.n_paneles} unit="paneles" label={`${s.n_serie}S × ${s.n_par}P`} />
          <KPI val={`${s.v_bat}V`} unit="" label="Tensión banco" />
          <KPI val={`$${fmt(Math.round(s.ah_mes/1000))}k`} unit="COP/mes" label="Ahorro estimado" color="var(--green)" />
          <KPI val={s.payback} unit="años" label="Payback simple" />
          <KPI val={fmtM(s.capex)} unit="COP" label="CAPEX total" />
        </div>
        <div className="card">
          <div className="card-hdr"><span className="card-title">Resumen del sistema</span></div>
          <div className="two-col">
            <div>{[["HSP", `${s.hsp} h/día`], ["T mín diseño", `${s.temp_min} °C`], ["kWp requerido", `${s.kwp_final} kWp`], ["kWp instalado", `${s.kwp_inst} kWp`], ["Paneles", `${s.n_paneles} u (${s.n_serie}S×${s.n_par}P)`]].map(([k, v]) => <div key={k} className="info-row"><span className="info-key">{k}</span><span className="info-val">{v}</span></div>)}</div>
            <div>{[["Voc string frío", `${s.voc_str} V`], ["I MPPT requerida", `${s.i_mppt_req} A`], ["Inversor", `${s.p_inv} kW senoidal pura`], ["Cable DC", `${s.s_norm} mm²`], ["Fusibles", `${Math.ceil(parseFloat(s.i_fuse)/5)*5} A`]].map(([k, v]) => <div key={k} className="info-row"><span className="info-key">{k}</span><span className="info-val">{v}</span></div>)}</div>
          </div>
        </div>
        <div className="card">
          <div className="card-hdr"><span className="card-title">Rentabilidad — 3 escenarios</span></div>
          <div className="three-col">
            {[{ l: "Bajo (−20%)", m: .8 }, { l: "Esperado", m: 1 }, { l: "Alto (+20%)", m: 1.2 }].map(sc => <div key={sc.l} style={{ background: "var(--surface2)", borderRadius: "var(--radius-sm)", padding: ".85rem", border: "1px solid var(--border)" }}>
              <div style={{ fontSize: ".68rem", color: "var(--text3)", marginBottom: ".3rem" }}>{sc.l}</div>
              <div style={{ fontFamily: "var(--mono)", color: "var(--accent)", fontSize: "1rem", fontWeight: 700 }}>${fmt(Math.round(s.ah_ano * sc.m))} COP/año</div>
              <div style={{ fontSize: ".72rem", color: "var(--text3)" }}>PB: {(s.capex / (s.ah_ano * sc.m)).toFixed(1)} años</div>
            </div>)}
          </div>
          <div className="progress-bar" style={{ marginTop: ".85rem" }}>
            <div className="progress-fill" style={{ width: `${Math.min(100, parseFloat(s.payback) / 15 * 100)}%` }} />
          </div>
          <div style={{ fontSize: ".68rem", color: "var(--text3)", textAlign: "right", marginTop: ".25rem" }}>Payback {s.payback} años / horizonte típico 15 años</div>
        </div>
      </>}

      {/* STEPS */}
      {tab === "steps" && <div className="step-list">
        {results.steps.map((st, i) => <Step key={i} step={st} defaultOpen={i === 0} />)}
      </div>}

      {/* ELEC */}
      {tab === "elec" && <div>
        <div className="card">
          <div className="card-hdr"><span className="card-title">Arreglo fotovoltaico</span></div>
          <div className="two-col">
            {[["Paneles totales", `${s.n_paneles} u`], ["Configuración", `${s.n_serie}S × ${s.n_par}P`], ["kWp instalado", `${s.kwp_inst} kWp`], ["Voc string frío", `${s.voc_str} V`], ["Vmp string", `${s.vmp_str} V`]].map(([k, v]) => <div key={k} className="info-row" style={{ gridColumn: undefined }}><span className="info-key">{k}</span><span className="info-val">{v}</span></div>)}
          </div>
        </div>
        <div className="card">
          <div className="card-hdr"><span className="card-title">Controlador MPPT — Comparativa</span></div>
          <CtrlCompare opts={s.ctrl} />
        </div>
        <div className="two-col">
          <div className="card">
            <div className="card-hdr"><span className="card-title">Inversor</span></div>
            {[["P continua", `${s.p_inv} kW`], ["P pico", `${(parseFloat(s.p_inv)*2).toFixed(1)} kW`], ["Onda", "Senoidal pura"], ["Tensión", `${s.v_bat} V DC`]].map(([k, v]) => <div key={k} className="info-row"><span className="info-key">{k}</span><span className="info-val">{v}</span></div>)}
          </div>
          <div className="card">
            <div className="card-hdr"><span className="card-title">Cableado DC</span></div>
            {[["Sección cable", `${s.s_norm} mm²`], ["Fusibles string", `${Math.ceil(parseFloat(s.i_fuse)/5)*5} A`], ["SPD DC", "Cat. II oblig."], ["Interruptor DC", `≥${Math.ceil(parseFloat(s.i_mppt_req)*0.8/5)*5} A`]].map(([k, v]) => <div key={k} className="info-row"><span className="info-key">{k}</span><span className="info-val">{v}</span></div>)}
          </div>
        </div>
      </div>}

      {/* QUOTE */}
      {tab === "quote" && <div className="card">
        <div className="card-hdr">
          <span className="card-title">Cotización editable</span>
          <div style={{ display: "flex", gap: ".4rem" }}>
            <button className="btn btn-secondary" onClick={() => setQuoteItems(q => [...q, { id: Date.now(), desc: "Nuevo ítem", qty: 1, unit_price: 0, total: 0 }])}>+ Ítem</button>
            <button className="btn btn-primary" onClick={exportCSV}>📥 CSV</button>
          </div>
        </div>
        <div className="quote-row-hdr"><span>Descripción</span><span style={{ textAlign: "center" }}>Cant.</span><span style={{ textAlign: "right" }}>P. Unit COP</span><span style={{ textAlign: "right" }}>Subtotal</span><span></span></div>
        {quoteItems.map(item => <div key={item.id} className="quote-row">
          <input type="text" value={item.desc} onChange={e => updQ(item.id, "desc", e.target.value)} style={{ fontSize: ".77rem", padding: ".3rem .5rem" }} />
          <input type="number" value={item.qty} onChange={e => updQ(item.id, "qty", e.target.value)} style={{ fontSize: ".77rem", textAlign: "center", padding: ".3rem .35rem" }} />
          <input type="number" value={item.unit_price} onChange={e => updQ(item.id, "unit_price", e.target.value)} style={{ fontSize: ".77rem", textAlign: "right", padding: ".3rem .5rem" }} />
          <div style={{ fontFamily: "var(--mono)", fontSize: ".78rem", textAlign: "right" }}>${fmt(item.total)}</div>
          <button className="btn btn-danger" style={{ padding: ".2rem .35rem", fontSize: ".7rem" }} onClick={() => setQuoteItems(q => q.filter(i => i.id !== item.id))}>✕</button>
        </div>)}
        <div className="two-col" style={{ marginTop: ".85rem" }}>
          <Field label="Mano de obra (%)"><input type="number" value={quoteLaborPct} onChange={e => setQuoteLaborPct(+e.target.value)} /></Field>
          <Field label="IVA (%)"><input type="number" value={quoteTax} onChange={e => setQuoteTax(+e.target.value)} /></Field>
        </div>
        <div className="quote-total-box">
          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: ".3rem" }}>
            <div style={{ fontSize: ".8rem", color: "var(--text2)" }}>Subtotal: <span style={{ fontFamily: "var(--mono)" }}>${fmt(Math.round(qSub))}</span></div>
            <div style={{ fontSize: ".8rem", color: "var(--text2)" }}>Mano de obra ({quoteLaborPct}%): <span style={{ fontFamily: "var(--mono)" }}>${fmt(Math.round(qLabor))}</span></div>
            <div style={{ fontSize: ".8rem", color: "var(--text2)" }}>IVA ({quoteTax}%): <span style={{ fontFamily: "var(--mono)" }}>${fmt(Math.round(qTax))}</span></div>
            <div style={{ fontFamily: "var(--mono)", fontSize: "1.1rem", fontWeight: 700, color: "var(--accent)" }}>TOTAL: ${fmt(Math.round(qTotal))} COP</div>
          </div>
        </div>
      </div>}

      {/* COMPARE */}
      {tab === "compare" && <div>
        <div className="card">
          <div className="card-hdr"><span className="card-title">Comparativa de tecnología de baterías</span></div>
          {s.bat ? <>
            <div className="compare-grid">
              {[
                { k: "LiFePO4", best: true, rows: [["Capacidad req.", `${s.bat.c_lifepo4.toFixed(2)} kWh`], ["Capacidad Ah", `${s.bat.ah_lifepo4.toFixed(0)} Ah @ ${s.v_bat}V`], ["Config.", `${s.bat.n_pylo} módulos Pylontech US5000`], ["DoD", "90%"], ["Ciclos", "6,000+"], ["Vida útil", "10–15 años"], ["Peso", `${s.bat.n_pylo * 74} kg`], ["CAPEX", `$${fmt(s.bat.capex_lifepo4)}`], ["TCO 15 años", `$${fmt(s.bat.tco_lifepo4)}`]] },
                { k: "Gel/AGM", best: false, rows: [["Capacidad req.", `${s.bat.c_gel.toFixed(2)} kWh`], ["Capacidad Ah", `${s.bat.ah_gel.toFixed(0)} Ah @ ${s.v_bat}V`], ["Config.", `${s.bat.n_gel_p}P × ${s.bat.n_gel_s}S Trojan T-105`], ["DoD", "50%"], ["Ciclos", "1,200"], ["Vida útil", "3–5 años"], ["Peso", `${s.bat.n_gel * 30} kg`], ["CAPEX", `$${fmt(s.bat.capex_gel)}`], ["TCO 15 años", `$${fmt(s.bat.tco_gel)}`]] },
                { k: "AGM 12V", best: false, rows: [["Capacidad req.", `${s.bat.c_agm.toFixed(2)} kWh`], ["Capacidad Ah", `${((s.bat.c_agm*1000)/s.v_bat).toFixed(0)} Ah @ ${s.v_bat}V`], ["Config.", `${s.bat.n_agm_p}P × ${s.bat.n_agm_s}S AGM 12V 200Ah`], ["DoD", "60%"], ["Ciclos", "1,000"], ["Vida útil", "3–4 años"], ["Peso", `${s.bat.n_agm * 55} kg`], ["CAPEX", `$${fmt(s.bat.capex_agm)}`], ["TCO 15 años", `$${fmt(s.bat.tco_agm)}`]] },
              ].map(c => <div key={c.k} className={`compare-card ${c.best ? "best" : ""}`}>
                <div className="compare-card-title">{c.best ? <span className="badge">RECOM.</span> : null}{c.k}</div>
                {c.rows.map(([k, v]) => <div key={k} className="info-row" style={{ fontSize: ".78rem" }}><span className="info-key">{k}</span><span className="info-val">{v}</span></div>)}
              </div>)}
            </div>
            <div className="alert alert-info" style={{ marginTop: ".85rem" }}>
              💡 <strong>Conclusión técnica:</strong> LiFePO4 tiene mayor CAPEX inicial pero menor TCO a largo plazo gracias a más ciclos y mayor DoD. Para proyectos con horizonte &gt;5 años y acceso a financiamiento, es la opción óptima. Gel/AGM solo se justifica con restricción presupuestaria estricta y capacidad de mantenimiento regular (limpieza, revisión de electrolito, reemplazo cada 3-5 años).
            </div>
          </> : <p style={{ color: "var(--text3)", fontSize: ".83rem" }}>Comparativa de baterías disponible solo para sistemas Off-Grid e Híbridos.</p>}
        </div>
      </div>}

      {/* LLM */}
      {tab === "llm" && <div className="card">
        <div className="card-hdr">
          <span className="card-title">🤖 Informe con IA — SolarMind AI</span>
          <span style={{display:"flex",alignItems:"center",gap:".4rem",fontSize:".72rem",color:"var(--green)"}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:"var(--green)",display:"inline-block"}}/>
            IA activa
          </span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:".5rem",marginBottom:".85rem",padding:".65rem .85rem",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)"}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:".4rem",marginBottom:".15rem"}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:apiKey?"var(--green)":"var(--orange,#f59e0b)",display:"inline-block"}}/>
              <span style={{fontSize:".78rem",fontWeight:700,color:"var(--text)"}}>SolarMind AI — Groq (LLaMA 3.3 70B)</span>
              <span style={{fontSize:".68rem",marginLeft:"auto",padding:".15rem .4rem",borderRadius:"999px",background:apiKey?"rgba(16,185,129,.15)":"rgba(245,158,11,.15)",color:apiKey?"var(--green)":"var(--accent-dark)",fontWeight:600}}>{apiKey?"API Key ✓ — GRATIS":"Sin API Key"}</span>
            </div>
            <div style={{fontSize:".72rem",color:"var(--text3)",lineHeight:1.5}}>
              {apiKey
                ? "Listo. Groq generará el informe con LLaMA 3.3 70B. 100% gratuito, ultra-rápido."
                : <span>Configure su API Key gratuita de Groq en <strong>Modo Avanzado → IA & Nube</strong>.</span>
              }
            </div>
          </div>
        </div>
        {!apiKey && <div style={{background:"rgba(59,130,246,.07)",border:"1px solid rgba(59,130,246,.2)",borderRadius:"var(--radius-sm)",padding:"1rem",marginBottom:".85rem"}}>
          <div style={{fontSize:".78rem",fontWeight:700,color:"var(--blue)",marginBottom:".6rem"}}>📋 Cómo obtener su API Key GRATUITA de Groq (1 minuto)</div>
          {[
            ["1","Abra","console.groq.com","en su navegador"],
            ["2","Haga clic en","Sign Up","e inicie sesión con Google"],
            ["3","En el menú izquierdo clic en","API Keys","→ \"Create API key\""],
            ["4","Copie la clave","(empieza con gsk_...)",""],
            ["5","Vaya a","Modo Avanzado → IA & Nube","y péguela allí"],
          ].map(([n,a,b,c])=>(
            <div key={n} style={{display:"flex",gap:".5rem",alignItems:"flex-start",marginBottom:".35rem"}}>
              <span style={{minWidth:18,height:18,borderRadius:"50%",background:"var(--blue)",color:"#fff",fontSize:".65rem",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>{n}</span>
              <span style={{fontSize:".75rem",color:"var(--text2)"}}>{a} <strong style={{color:"var(--text)"}}>{b}</strong> {c}</span>
            </div>
          ))}
          <div style={{fontSize:".72rem",color:"var(--text3)",marginTop:".5rem",paddingTop:".5rem",borderTop:"1px solid rgba(59,130,246,.15)"}}>
            ✅ <strong>Sin tarjeta de crédito.</strong> Groq ofrece LLaMA 3.3 70B, Gemma 2 y otros modelos de forma completamente gratuita con límites muy generosos (14.400 peticiones/día).
          </div>
        </div>}
        <button className="btn btn-primary" onClick={callLLM} disabled={llmLoading} style={{marginBottom:"1rem",padding:".65rem 1.5rem",fontSize:".88rem"}}>
          {llmLoading ? <><span className="spinner" /> Generando informe profesional...</> : "🤖 Generar Informe Completo con IA"}
        </button>
        {llmLoading && <div className="alert alert-info" style={{fontSize:".77rem",marginBottom:".75rem"}}>
          ⏳ La IA está analizando su sistema y redactando el informe completo. Esto puede tomar 15–30 segundos...
        </div>}
        {llmResult && <div className="llm-output">
          {[
            { k:"resumen", l:"📋 Resumen Ejecutivo", color:"var(--blue)" },
            { k:"evaluacion_tecnica", l:"🔧 Evaluación Técnica", color:"var(--accent-dark)" },
            { k:"analisis_economico", l:"💰 Análisis Económico", color:"var(--green)" },
            { k:"recomendaciones", l:"✅ Recomendaciones Técnicas y Comerciales", color:"var(--purple)" },
            { k:"riesgos", l:"⚠️ Análisis de Riesgos", color:"var(--red)" },
            { k:"propuesta_comercial", l:"💼 Propuesta Comercial al Cliente", color:"var(--blue)" },
            { k:"cronograma", l:"📅 Cronograma de Implementación", color:"var(--green)" },
            { k:"mantenimiento", l:"🛠️ Plan de Mantenimiento Preventivo", color:"var(--accent-dark)" },
            // legacy fields for backward compatibility
            { k:"explicacion_tecnica", l:"🔢 Detalle Técnico", color:"var(--accent-dark)" },
            { k:"oferta_comercial", l:"💼 Oferta Comercial", color:"var(--blue)" },
          ].filter(x => llmResult[x.k] && llmResult[x.k].trim()).map(x => (
            <div key={x.k} style={{borderBottom:"1px solid var(--border)",paddingBottom:"1rem",marginBottom:"1rem"}}>
              <div className="llm-section-title" style={{color:x.color,fontSize:".78rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:".6rem"}}>{x.l}</div>
              <div className="llm-text" style={{fontSize:".84rem",lineHeight:1.8,whiteSpace:"pre-wrap"}}>{llmResult[x.k]}</div>
            </div>
          ))}
          <div style={{display:"flex",gap:".5rem",marginTop:".5rem",paddingTop:".75rem",borderTop:"1px solid var(--border)"}}>
            <button className="btn btn-secondary" style={{fontSize:".75rem"}} onClick={() => {
              const text = Object.entries(llmResult).filter(([,v])=>v).map(([k,v])=>`=== ${k.toUpperCase()} ===\n${v}`).join("\n\n");
              const blob = new Blob([text],{type:"text/plain"});
              const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
              a.download = `Informe_IA_${(form.nombre_proyecto||"solar").replace(/\s+/g,"_")}.txt`; a.click();
            }}>📥 Descargar informe (.txt)</button>
            <button className="btn btn-secondary" style={{fontSize:".75rem"}} onClick={() => {
              const text = Object.entries(llmResult).filter(([,v])=>v).map(([k,v])=>`${k.toUpperCase()}:\n${v}`).join("\n\n");
              navigator.clipboard.writeText(text).catch(()=>{});
            }}>📋 Copiar todo</button>
          </div>
        </div>}
      </div>}

      {/* CATALOG */}
      {tab === "catalog" && <CatalogTab catalog={catalog} setCatalog={setCatalog} />}
    </>;
  };

  return <div className="app">
    {/* TEMPLATES MODAL */}
    {showTemplates && <div className="tpl-modal-bg" onClick={()=>setShowTemplates(false)}>
      <div className="tpl-modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".5rem"}}>
          <div>
            <h2 style={{fontSize:"1rem",fontWeight:700,color:"var(--text)"}}>📋 Plantillas de proyecto</h2>
            <p style={{fontSize:".78rem",color:"var(--text3)",marginTop:".2rem"}}>Seleccione un tipo para pre-cargar los valores típicos</p>
          </div>
          <button className="btn btn-ghost" style={{padding:".3rem .6rem"}} onClick={()=>setShowTemplates(false)}>✕</button>
        </div>
        <div className="tpl-grid">
          {PROJECT_TEMPLATES.map(tpl=>(
            <div key={tpl.id} className="tpl-card" onClick={()=>loadTemplate(tpl)}>
              <div className="tpl-card-icon">{tpl.icon}</div>
              <div className="tpl-card-title">{tpl.title}</div>
              <div className="tpl-card-desc">{tpl.desc}</div>
            </div>
          ))}
        </div>
        <div className="alert alert-info" style={{marginTop:"1rem",fontSize:".75rem"}}>
          💡 Al cargar una plantilla se pre-llenan los datos típicos. Puede ajustar cualquier valor antes de calcular.
        </div>
      </div>
    </div>}

    {/* SHARE MODAL */}
    {showShare && <div className="share-modal-bg" onClick={()=>setShowShare(false)}>
      <div className="share-modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".75rem"}}>
          <h2 style={{fontSize:"1rem",fontWeight:700,color:"var(--text)"}}>🔗 Compartir proyecto</h2>
          <button className="btn btn-ghost" style={{padding:".3rem .6rem"}} onClick={()=>setShowShare(false)}>✕</button>
        </div>
        <p style={{fontSize:".82rem",color:"var(--text2)",marginBottom:".5rem"}}>Comparta este enlace para que cualquier persona pueda abrir el proyecto con los mismos parámetros:</p>
        <div className="share-url-box">{shareUrl}</div>
        <div style={{display:"flex",gap:".5rem",flexWrap:"wrap"}}>
          <button className={`btn ${shareCopied?"btn-green":"btn-primary"}`} style={{flex:1}} onClick={copyShareUrl}>
            {shareCopied ? "✅ ¡Copiado!" : "📋 Copiar enlace"}
          </button>
          <button className="btn btn-secondary" onClick={()=>{window.open(`https://wa.me/?text=`+encodeURIComponent("SolarMind Pro - Proyecto solar: "+shareUrl),"_blank");}}>💬 WhatsApp</button>
          <button className="btn btn-secondary" onClick={()=>{window.open(`mailto:?subject=Proyecto Solar SolarMind&body=`+encodeURIComponent("Le comparto el proyecto fotovoltaico diseñado en SolarMind Designer Pro:\n\n"+shareUrl),"_blank");}}>✉️ Email</button>
        </div>
        <div className="alert alert-warn" style={{marginTop:".75rem",fontSize:".75rem"}}>
          ⚠️ El enlace contiene los parámetros del formulario. Al abrirlo en otro dispositivo se pre-cargarán los datos y se podrá recalcular. Para compartir resultados finales use la exportación PDF.
        </div>
      </div>
    </div>}
    <header className="header">
      <div className="logo" onClick={() => setView("dashboard")} style={{ cursor: "pointer" }}>
        <img src={window.LOGO_SRC} alt="SolarMind" style={{ height: 38 }} />
      </div>
      <nav className="header-nav">
        <button className={`nav-btn ${view === "dashboard" ? "active" : ""}`} onClick={() => setView("dashboard")}>🏠 Inicio</button>
        <button className={`nav-btn ${view === "calc" ? "active" : ""}`} onClick={() => setView("calc")}>⚡ Calculadora</button>
        <button className={`nav-btn ${view === "history" ? "active" : ""}`} onClick={() => setView("history")}>📋 Historial{projects.length > 0 && <span className="badge" style={{ marginLeft: ".3rem", fontSize: ".6rem" }}>{projects.length}</span>}</button>
        <button className={`nav-btn ${view === "consumo" ? "active" : ""}`} onClick={() => setView("consumo")}>🔌 Consumo</button>
      </nav>
      <div className="header-right">
        {swUpdateReady && <button className="btn" style={{background:"var(--green)",color:"#fff",fontSize:".72rem",padding:".3rem .7rem"}}
          onClick={() => { window._swReg?.waiting?.postMessage("SKIP_WAITING"); window.location.reload(); }}
          title="Nueva versión disponible">🔄 Actualizar</button>}
        {!pwaInstalled && pwaInstallPrompt && <button className="btn btn-secondary" style={{fontSize:".72rem",padding:".3rem .7rem"}}
          onClick={() => { pwaInstallPrompt.prompt(); pwaInstallPrompt.userChoice.then(()=>setPwaInstallPrompt(null)); }}
          title="Instalar como app">📲 Instalar App</button>}
        <button className="theme-btn" onClick={() => setTheme(t => t === "dark" ? "light" : "dark")} title="Cambiar tema">
          {theme === "dark" ? "☀️" : "🌙"}
        </button>
        <button className="btn btn-primary" onClick={() => { setResults(null); setForm(f => ({ ...f, nombre_proyecto: "", nombre_cliente: "" })); setView("calc"); }}>+ Nuevo</button>
      </div>
    </header>

    <div className="main-content">
      {view === "dashboard" && Dashboard()}
      {view === "history" && <HistoryView projects={projects} onLoad={loadProject} onDelete={deleteProject} onNew={() => { setResults(null); setView("calc"); }} />}
      {view === "consumo" && <ConsumoView appliances={appliances} setAppliances={setAppliances} onApply={(kwh) => { sf("consumo_mensual_kwh", kwh); setView("calc"); }} />}
      {view === "calc" && <div className="calc-layout">
        {Sidebar()}
        <main style={{ flex: 1, overflowY: "auto", padding: "1.5rem" }}>
          {CalcResults()}
        </main>
      </div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
