<style>
:root{
  --bg:#f0f4f8;--surface:#ffffff;--surface2:#f8fafc;--surface3:#eef2f7;
  --border:#dde3ec;--border2:#c8d3e0;
  --accent:#f59e0b;--accent-dark:#d97706;--accent-light:#fef3c7;
  --blue:#2563eb;--blue-light:#dbeafe;
  --green:#059669;--green-light:#d1fae5;
  --red:#dc2626;--red-light:#fee2e2;
  --purple:#7c3aed;--purple-light:#ede9fe;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;--text4:#cbd5e1;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.08),0 4px 6px rgba(0,0,0,.05);
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
  --radius:10px;--radius-sm:6px;--radius-lg:14px;
}
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--surface3:#21262d;
  --border:#30363d;--border2:#3d444d;
  --accent:#f59e0b;--accent-dark:#d97706;--accent-light:rgba(245,158,11,.12);
  --blue:#3b82f6;--blue-light:rgba(59,130,246,.12);
  --green:#10b981;--green-light:rgba(16,185,129,.12);
  --red:#f87171;--red-light:rgba(248,113,113,.12);
  --purple:#a78bfa;--purple-light:rgba(167,139,250,.12);
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;--text4:#2d333b;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shadow-md:0 4px 6px rgba(0,0,0,.25),0 2px 4px rgba(0,0,0,.2);
  --shadow-lg:0 10px 15px rgba(0,0,0,.3),0 4px 6px rgba(0,0,0,.2);
}
*{box-sizing:border-box;margin:0;padding:0;transition:background-color .15s,border-color .15s,color .15s}
html,body,#root{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text)}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
/* LAYOUT */
.app{display:flex;flex-direction:column;min-height:100vh}
.header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 1.5rem;height:56px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:200;
  box-shadow:var(--shadow)
}
.logo{display:flex;align-items:center;gap:.5rem;text-decoration:none}
.logo img{height:38px;width:auto;object-fit:contain}
.logo-text{font-weight:700;font-size:.95rem;color:var(--text)}
.logo-sub{font-size:.65rem;color:var(--text3);font-weight:400}
.header-nav{display:flex;align-items:center;gap:.25rem}
.nav-btn{
  padding:.45rem .85rem;border-radius:var(--radius-sm);font-size:.8rem;
  font-weight:500;cursor:pointer;border:none;background:transparent;
  color:var(--text2);transition:all .15s;font-family:var(--sans);display:flex;align-items:center;gap:.4rem
}
.nav-btn:hover{background:var(--surface3);color:var(--text)}
.nav-btn.active{background:var(--accent-light);color:var(--accent-dark);font-weight:600}
.header-right{display:flex;align-items:center;gap:.5rem}
.theme-btn{
  width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:.95rem;color:var(--text2)
}
.theme-btn:hover{background:var(--surface3)}
.main-content{flex:1;overflow-y:auto}
/* DASHBOARD */
.dashboard{padding:2rem 2rem 3rem;max-width:1200px;margin:0 auto;width:100%}
.dash-hero{
  background:linear-gradient(135deg,#1e3a5f 0%,#0f2340 60%,#1a3555 100%);
  border-radius:var(--radius-lg);padding:2.5rem;margin-bottom:2rem;
  display:flex;align-items:center;justify-content:space-between;
  overflow:hidden;position:relative
}
.dash-hero::before{
  content:'';position:absolute;right:-60px;top:-60px;
  width:280px;height:280px;border-radius:50%;
  background:rgba(245,158,11,.08);pointer-events:none
}
.dash-hero::after{
  content:'';position:absolute;right:40px;bottom:-80px;
  width:200px;height:200px;border-radius:50%;
  background:rgba(245,158,11,.06);pointer-events:none
}
.dash-hero-text h1{font-size:1.6rem;font-weight:700;color:#fff;margin-bottom:.5rem}
.dash-hero-text p{font-size:.9rem;color:rgba(255,255,255,.65);max-width:420px;line-height:1.6}
.btn-hero{
  padding:.75rem 1.5rem;background:var(--accent);color:#000;
  border:none;border-radius:var(--radius);font-weight:700;font-size:.9rem;
  cursor:pointer;white-space:nowrap;margin-top:1rem;display:inline-flex;
  align-items:center;gap:.5rem;box-shadow:0 4px 14px rgba(245,158,11,.4)
}
.btn-hero:hover{background:var(--accent-dark);transform:translateY(-1px)}
.dash-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.25rem;box-shadow:var(--shadow)
}
.stat-icon{font-size:1.5rem;margin-bottom:.5rem}
.stat-val{font-size:1.6rem;font-weight:700;color:var(--text);font-family:var(--mono)}
.stat-label{font-size:.75rem;color:var(--text2);margin-top:.2rem}
.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.section-hdr h2{font-size:1rem;font-weight:600;color:var(--text)}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
.project-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.25rem;cursor:pointer;box-shadow:var(--shadow);transition:all .2s
}
.project-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.project-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.85rem}
.project-name{font-weight:600;font-size:.92rem;color:var(--text)}
.project-date{font-size:.7rem;color:var(--text3)}
.project-chips{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.85rem}
.project-kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem}
.proj-kpi{background:var(--surface2);border-radius:var(--radius-sm);padding:.5rem;text-align:center}
.proj-kpi-val{font-family:var(--mono);font-size:.9rem;font-weight:700;color:var(--accent)}
.proj-kpi-lbl{font-size:.65rem;color:var(--text3);margin-top:.1rem}
.project-actions{display:flex;gap:.35rem;margin-top:.85rem;border-top:1px solid var(--border);padding-top:.75rem}
.empty-projects{
  background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius);
  padding:3rem;text-align:center;color:var(--text3)
}
.empty-projects p{font-size:.85rem;margin-bottom:1rem}
/* CALCULATOR */
.calc-layout{display:flex;min-height:calc(100vh - 56px)}
.calc-sidebar{
  width:300px;min-width:300px;background:var(--surface);
  border-right:1px solid var(--border);overflow-y:auto;
  padding:1.25rem;display:flex;flex-direction:column;gap:1px
}
.calc-main{flex:1;overflow-y:auto;padding:1.5rem}
.mode-switch{
  display:flex;background:var(--surface2);border-radius:var(--radius-sm);
  padding:3px;border:1px solid var(--border);margin-bottom:1.25rem
}
.mode-sw-btn{
  flex:1;padding:.4rem;text-align:center;font-size:.75rem;font-weight:600;
  cursor:pointer;border-radius:4px;border:none;background:transparent;
  color:var(--text3);font-family:var(--sans);transition:all .15s
}
.mode-sw-btn.active{background:var(--surface);color:var(--accent);box-shadow:var(--shadow)}
/* FIELDS */
.field-section{margin-bottom:.25rem}
.section-lbl{
  font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text3);padding:.75rem 0 .4rem;border-bottom:1px solid var(--border);margin-bottom:.75rem
}
.field{margin-bottom:.85rem;position:relative}
.field-lbl{
  font-size:.75rem;font-weight:500;color:var(--text2);
  margin-bottom:.3rem;display:flex;align-items:center;gap:.35rem
}
.tooltip-icon{
  width:14px;height:14px;border-radius:50%;background:var(--surface3);
  border:1px solid var(--border2);color:var(--text3);font-size:.6rem;
  cursor:help;display:inline-flex;align-items:center;justify-content:center;position:relative
}
.tooltip-icon:hover .tooltip-box{display:block}
.tooltip-box{
  display:none;position:absolute;left:50%;top:calc(100% + 6px);transform:translateX(-50%);
  background:var(--text);color:var(--surface);font-size:.72rem;line-height:1.5;
  padding:.5rem .75rem;border-radius:var(--radius-sm);width:220px;z-index:100;
  box-shadow:var(--shadow-lg);font-weight:400;font-family:var(--sans)
}
.field-hint{font-size:.67rem;color:var(--text3);margin-top:.2rem}
input[type=number],input[type=text],input[type=password],select,textarea{
  width:100%;padding:.5rem .7rem;background:var(--surface2);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);font-family:var(--mono);font-size:.8rem;
  outline:none;transition:border-color .15s,box-shadow .15s
}
input:focus,select:focus,textarea:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)
}
select{cursor:pointer;background-color:var(--surface2)}
select option{background:var(--surface2);color:var(--text)}
.btn-calc{
  width:100%;padding:.75rem;
  background:linear-gradient(135deg,var(--accent) 0%,#f97316 100%);
  border:none;border-radius:var(--radius);color:#000;font-weight:700;
  font-size:.9rem;cursor:pointer;box-shadow:0 4px 14px rgba(245,158,11,.35);
  font-family:var(--sans);letter-spacing:.01em;margin-top:.75rem;
  display:flex;align-items:center;justify-content:center;gap:.5rem
}
.btn-calc:hover{filter:brightness(1.05);transform:translateY(-1px)}
.btn-calc:disabled{opacity:.5;cursor:default;transform:none}
/* BUTTONS */
.btn{
  padding:.4rem .9rem;border-radius:var(--radius-sm);font-size:.78rem;
  font-weight:500;cursor:pointer;font-family:var(--sans);border:1px solid var(--border);
  display:inline-flex;align-items:center;gap:.35rem;transition:all .15s
}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-dark)}
.btn-secondary{background:var(--surface2);color:var(--text2)}
.btn-secondary:hover{background:var(--surface3);color:var(--text)}
.btn-ghost{background:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--surface3);color:var(--text)}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:var(--red-light)}
.btn-blue{background:var(--blue-light);color:var(--blue);border-color:var(--blue)}
.btn-green{background:var(--green-light);color:var(--green);border-color:var(--green)}
/* TAGS/CHIPS */
.tag{
  display:inline-flex;align-items:center;gap:.25rem;padding:.2rem .55rem;
  border-radius:20px;font-size:.68rem;font-weight:600;font-family:var(--mono)
}
.tag-amber{background:var(--accent-light);color:var(--accent-dark)}
.tag-blue{background:var(--blue-light);color:var(--blue)}
.tag-green{background:var(--green-light);color:var(--green)}
.tag-red{background:var(--red-light);color:var(--red)}
.tag-purple{background:var(--purple-light);color:var(--purple)}
.chip-group{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.75rem}
.chip{
  padding:.25rem .65rem;border-radius:20px;font-size:.72rem;font-weight:500;
  cursor:pointer;border:1px solid var(--border);background:var(--surface2);
  color:var(--text2);transition:all .15s;font-family:var(--sans)
}
.chip.active{background:var(--accent);color:#000;border-color:var(--accent)}
.chip:hover:not(.active){border-color:var(--accent);color:var(--accent)}
/* CARDS */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)
}
.card-hdr{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:1rem;padding-bottom:.65rem;border-bottom:1px solid var(--border)
}
.card-title{font-size:.8rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
/* TABS */
.tabs{display:flex;gap:.15rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border)}
.tab{
  padding:.6rem 1.1rem;cursor:pointer;font-size:.8rem;font-weight:500;
  color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;
  background:none;border-top:none;border-left:none;border-right:none;
  font-family:var(--sans);transition:all .15s
}
.tab.active{color:var(--accent-dark);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text2)}
/* KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem}
.kpi{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1rem;text-align:center;box-shadow:var(--shadow)
}
.kpi-val{font-family:var(--mono);font-size:1.5rem;font-weight:700;color:var(--accent);line-height:1}
.kpi-unit{font-size:.65rem;color:var(--text3);margin-top:.15rem}
.kpi-lbl{font-size:.7rem;color:var(--text2);margin-top:.35rem;font-weight:500}
/* STEPS */
.step-list{display:flex;flex-direction:column;gap:.6rem}
.step{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--surface)}
.step-hdr{
  padding:.75rem 1rem;display:flex;justify-content:space-between;
  align-items:center;cursor:pointer;user-select:none;background:var(--surface2)
}
.step-hdr:hover{background:var(--surface3)}
.step-hdr-left{display:flex;align-items:center;gap:.65rem}
.step-num{
  width:22px;height:22px;border-radius:50%;background:var(--accent);
  color:#000;font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-family:var(--mono)
}
.step-title{font-size:.83rem;font-weight:600;color:var(--text)}
.step-body{
  padding:1.25rem;background:var(--bg);border-top:1px solid var(--border);
  font-size:.82rem;line-height:1.7;color:var(--text2)
}
.formula-block{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:.85rem 1rem;margin:.75rem 0;font-family:var(--mono);font-size:.82rem;
  line-height:2;color:var(--text);border-left:3px solid var(--accent)
}
.formula-block .var{color:var(--blue);font-weight:500}
.formula-block .result{color:var(--green);font-weight:700}
.formula-block .comment{color:var(--text3);font-size:.75rem}
.explain-box{
  background:var(--blue-light);border:1px solid rgba(59,130,246,.25);
  border-radius:var(--radius-sm);padding:.75rem 1rem;margin:.65rem 0;
  font-size:.79rem;line-height:1.65;color:var(--blue)
}
[data-theme="dark"] .explain-box{background:rgba(59,130,246,.1);color:#93c5fd}
.warn-box{
  background:var(--accent-light);border:1px solid rgba(245,158,11,.3);
  border-radius:var(--radius-sm);padding:.65rem .9rem;margin:.5rem 0;
  font-size:.78rem;color:var(--accent-dark);display:flex;gap:.5rem;align-items:flex-start
}
[data-theme="dark"] .warn-box{background:rgba(245,158,11,.1);color:#fcd34d}
.info-row{display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.81rem}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--text2)}
.info-val{font-family:var(--mono);font-weight:500;color:var(--text)}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:.8rem}
.tbl th{
  text-align:left;padding:.55rem .75rem;border-bottom:2px solid var(--border);
  color:var(--text3);font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em
}
.tbl td{padding:.55rem .75rem;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.tbl tbody tr:hover td{background:var(--surface2)}
.tbl .mono{font-family:var(--mono);font-size:.78rem;color:var(--text)}
/* QUOTE */
.quote-row-hdr{
  display:grid;grid-template-columns:3fr .8fr 1.4fr 1.4fr 36px;
  gap:.4rem;padding:.35rem .2rem;font-size:.68rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.06em;color:var(--text3)
}
.quote-row{
  display:grid;grid-template-columns:3fr .8fr 1.4fr 1.4fr 36px;
  gap:.4rem;padding:.35rem 0;border-bottom:1px solid var(--border);align-items:center
}
.quote-total-box{
  background:var(--surface2);border-radius:var(--radius);padding:1rem;
  margin-top:1rem;border:1px solid var(--border)
}
/* COMPARE */
.compare-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem;margin-top:1rem}
.compare-card{
  border:1px solid var(--border);border-radius:var(--radius);padding:1rem;background:var(--surface2)
}
.compare-card.best{border-color:var(--green);background:var(--green-light)}
[data-theme="dark"] .compare-card.best{background:rgba(16,185,129,.1)}
.compare-card-title{font-size:.78rem;font-weight:700;margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem}
/* CONTROLLER COMPARE */
.ctrl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem}
.ctrl-card{border:1px solid var(--border);border-radius:var(--radius);padding:1rem;background:var(--surface2)}
.ctrl-card.recommended{border-color:var(--accent);background:var(--accent-light)}
[data-theme="dark"] .ctrl-card.recommended{background:rgba(245,158,11,.1)}
.ctrl-title{font-size:.82rem;font-weight:700;margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
.pros-cons{margin-top:.65rem;font-size:.76rem}
.pro{color:var(--green);padding:.15rem 0}
.con{color:var(--red);padding:.15rem 0}
/* LLM */
.llm-output{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.25rem;display:flex;flex-direction:column;gap:1.25rem
}
.llm-section-title{
  font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--blue);margin-bottom:.5rem
}
.llm-text{font-size:.85rem;line-height:1.75;color:var(--text2);white-space:pre-wrap}
/* HISTORY */
.history-view{padding:1.5rem;max-width:900px;margin:0 auto}
/* ALERTS */
.alert{
  border-radius:var(--radius-sm);padding:.65rem .9rem;margin-bottom:.5rem;
  font-size:.8rem;display:flex;gap:.5rem;align-items:flex-start
}
.alert-warn{background:var(--accent-light);border:1px solid rgba(245,158,11,.3);color:var(--accent-dark)}
.alert-info{background:var(--blue-light);border:1px solid rgba(59,130,246,.25);color:var(--blue)}
.alert-success{background:var(--green-light);border:1px solid rgba(16,185,129,.25);color:var(--green)}
[data-theme="dark"] .alert-warn{background:rgba(245,158,11,.1);color:#fcd34d}
[data-theme="dark"] .alert-info{background:rgba(59,130,246,.1);color:#93c5fd}
[data-theme="dark"] .alert-success{background:rgba(16,185,129,.1);color:#6ee7b7}
/* MISC */
.divider{border:none;border-top:1px solid var(--border);margin:.85rem 0}
.progress-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#f97316);border-radius:3px;transition:width .6s ease}
.spinner{
  width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;display:inline-block
}
@keyframes spin{to{transform:rotate(360deg)}}
.badge{
  padding:.15rem .5rem;border-radius:20px;font-size:.65rem;font-weight:700;
  font-family:var(--mono);background:var(--accent);color:#000
}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.85rem}
.panel-rec-card{
  background:var(--surface);border:2px solid var(--accent);border-radius:var(--radius);
  padding:1rem;margin-bottom:1rem;box-shadow:0 0 0 4px var(--accent-light)
}
[data-theme="dark"] .panel-rec-card{box-shadow:0 0 0 4px rgba(245,158,11,.15)}
.panel-rec-title{font-size:.75rem;font-weight:700;color:var(--accent-dark);margin-bottom:.65rem;display:flex;align-items:center;gap:.4rem}
@media(max-width:820px){
  .calc-layout{flex-direction:column}
  .calc-sidebar{width:100%;min-width:0}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .compare-grid,.ctrl-grid,.two-col,.three-col{grid-template-columns:1fr}
  .dash-stats{grid-template-columns:1fr 1fr}
  .dash-hero{flex-direction:column;gap:1rem}
}
/* VALIDATION */
.field-error{font-size:.67rem;color:var(--red);margin-top:.25rem;display:flex;align-items:center;gap:.3rem}
input.invalid,select.invalid{border-color:var(--red)!important;box-shadow:0 0 0 3px var(--red-light)!important}
/* TEMPLATES */
.tpl-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem}
.tpl-modal{background:var(--surface);border-radius:var(--radius-lg);padding:1.75rem;max-width:640px;width:100%;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
.tpl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem;margin-top:1rem}
.tpl-card{background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius);padding:1.1rem;cursor:pointer;transition:all .2s;text-align:center}
.tpl-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.tpl-card-icon{font-size:2rem;margin-bottom:.5rem}
.tpl-card-title{font-weight:700;font-size:.85rem;color:var(--text);margin-bottom:.3rem}
.tpl-card-desc{font-size:.71rem;color:var(--text3);line-height:1.4}
/* SHARE MODAL */
.share-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem}
.share-modal{background:var(--surface);border-radius:var(--radius-lg);padding:1.75rem;max-width:520px;width:100%;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
.share-url-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.65rem .85rem;font-family:var(--mono);font-size:.72rem;color:var(--text2);word-break:break-all;margin:1rem 0;line-height:1.6;max-height:80px;overflow-y:auto}
/* CHARTS */
.chart-container{position:relative;height:260px;margin:.5rem 0}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem}
@media(max-width:820px){.chart-grid{grid-template-columns:1fr}.tpl-grid{grid-template-columns:1fr}}
/* PDF BUTTON */
.btn-pdf{background:var(--red-light);color:var(--red);border-color:var(--red)}
/* ── APPLIANCES MODULE ─────────────────────────────────────────── */
.consumo-view{padding:1.5rem;max-width:1000px;margin:0 auto}
.consumo-hero{
  background:linear-gradient(135deg,#064e3b 0%,#065f46 60%,#047857 100%);
  border-radius:var(--radius-lg);padding:2rem 2.5rem;margin-bottom:1.5rem;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;overflow:hidden
}
.consumo-hero::before{content:'';position:absolute;right:-40px;top:-50px;
  width:220px;height:220px;border-radius:50%;background:rgba(16,185,129,.12);pointer-events:none}
.consumo-hero-text h2{font-size:1.3rem;font-weight:700;color:#fff;margin-bottom:.4rem}
.consumo-hero-text p{font-size:.85rem;color:rgba(255,255,255,.7);max-width:460px;line-height:1.6}
.consumo-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.85rem;margin-bottom:1.5rem}
.consumo-kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1rem;text-align:center;box-shadow:var(--shadow)}
.consumo-kpi-val{font-family:var(--mono);font-size:1.35rem;font-weight:700;line-height:1}
.consumo-kpi-unit{font-size:.65rem;color:var(--text3);margin-top:.15rem}
.consumo-kpi-lbl{font-size:.7rem;color:var(--text2);margin-top:.3rem;font-weight:500}
.app-tbl{width:100%;border-collapse:collapse}
.app-tbl th{padding:.5rem .65rem;background:var(--surface2);border-bottom:2px solid var(--border);
  font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:var(--text3);text-align:left;white-space:nowrap}
.app-tbl td{padding:.3rem .4rem;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.app-tbl tbody tr:hover td{background:var(--surface2)}
.ainput{width:100%;padding:.3rem .45rem;background:var(--surface);border:1px solid var(--border);
  border-radius:4px;color:var(--text);font-family:var(--mono);font-size:.78rem;outline:none}
.ainput:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(16,185,129,.15)}
.ainput-num{text-align:center}
.kwh-col{font-family:var(--mono);font-size:.82rem;font-weight:600;color:var(--green);
  text-align:right;padding-right:.75rem !important}
.consumo-footer{background:var(--green-light);border:2px solid var(--green);border-radius:var(--radius);
  padding:1.1rem 1.4rem;display:flex;align-items:center;justify-content:space-between;margin-top:.75rem}
[data-theme="dark"] .consumo-footer{background:rgba(16,185,129,.1);border-color:var(--green)}
.consumo-total-val{font-family:var(--mono);font-size:1.5rem;font-weight:700;color:var(--green)}
.quick-add{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
.asel{padding:.42rem .7rem;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-family:var(--sans);font-size:.8rem;
  outline:none;cursor:pointer}
.asel:focus{border-color:var(--green)}
.btn-green{background:var(--green-light);color:var(--green);border-color:var(--green)}
.btn-green:hover{background:rgba(16,185,129,.25)}
@media(max-width:820px){.consumo-kpi-row{grid-template-columns:1fr 1fr}.consumo-hero{flex-direction:column;gap:1rem}}

</style>

// ── CALCULATOR ENGINE ──────────────────────────────────────────────────────────
function selectBestPanel(kwp_final, catalog) {
  const panels = catalog.filter(c => c.type === "panel" && c.wp && c.voc && c.vmp && c.imp && c.isc);
  if (!panels.length) return null;
  // Score each panel: prefer higher efficiency relative to price, and fewer panels needed
  const scored = panels.map(p => {
    const n = Math.ceil((kwp_final * 1000) / p.wp);
    const cost_score = 1 / (p.price * n);
    const wp_score = p.wp / 1000;
    const score = cost_score * 1000000 + wp_score;
    return { ...p, n_needed: n, score };
  });
  scored.sort((a, b) => b.score - a.score);
  return scored[0];
}

function recommendOptimalPanel(kwp_final) {
  // Basado en catálogo real de Dina Energy (dinaenergy.com.co)
  if (kwp_final <= 1.5) return { wp: 210, voc: 23.95, vmp: 20.05, imp: 10.47, isc: 11.07, coef_voc: -0.0030, name: "Restar RT7E-210M 210W 12V Mono — Dina Energy $269.760", recommended: true };

}

function calculate(inputs, catalog) {
  const steps = [], warnings = [], info = [];
  const {
    consumo_mensual_kwh, precio_kwh_cop, region, tipo_sistema,
    porcentaje_cobertura = 1.0, dias_autonomia = 2,
    panel_wp_custom, panel_voc_custom, panel_vmp_custom,
    panel_imp_custom, panel_isc_custom, panel_coef_voc_custom,
    mppt_voc_max_custom, hsp_manual, temp_min_manual,
    perdidas_manual, margen_manual, tension_banco_manual, demanda_max_kw,
    nombre_proyecto = "Proyecto sin nombre", nombre_cliente = "",
    advanced_mode = false
  } = inputs;

  const rk = (region || "").toLowerCase().trim();

  // ── PASO 1: Recurso solar ─────────────────────────────────────────────────
  let hsp = hsp_manual ? Number(hsp_manual) : (HSP[rk] ?? HSP.default);
  let hsp_src = hsp_manual ? "valor ingresado manualmente" : (HSP[rk] ? `tabla interna — ${rk}` : "valor por defecto (4.5 h/día)");
  if (!HSP[rk] && !hsp_manual) warnings.push(`HSP no encontrado para "${region}". Se usó ${hsp} h/día como valor de referencia. En Modo Avanzado puede ingresar el valor real de PVGIS.`);

  let temp_min = (temp_min_manual !== undefined && temp_min_manual !== "" && temp_min_manual !== null) ? Number(temp_min_manual) : (TEMP[rk] ?? TEMP.default);
  let temp_src = (temp_min_manual !== undefined && temp_min_manual !== "") ? "valor manual" : (TEMP[rk] !== undefined ? `tabla interna — ${rk}` : "valor por defecto (10°C)");

  steps.push({
    num: 1, title: "Recurso solar y temperatura de diseño",
    content: {
      formula: `HSP = ${hsp} h/día\nT_min_diseño = ${temp_min} °C`,
      explain: `La HSP (Hora Solar Pico) representa las horas equivalentes de irradiancia de 1000 W/m² que recibe la superficie en un día promedio. Es el parámetro más crítico del dimensionamiento: a mayor HSP, menos paneles se necesitan. Se obtiene idealmente de PVGIS o de mediciones locales. La temperatura mínima de diseño se usa para calcular el voltaje de circuito abierto en condición fría extrema (Voc_frío), que determina el límite superior de seguridad del MPPT.`,
      values: [["HSP utilizado", `${hsp} h/día`, hsp_src], ["T mín diseño", `${temp_min} °C`, temp_src]],
    }
  });

  // ── PASO 2: Consumo diario ────────────────────────────────────────────────
  const e_dia = consumo_mensual_kwh / 30;
  steps.push({
    num: 2, title: "Consumo diario promedio",
    content: {
      formula: `E_día = Consumo_mensual / 30 días\n      = ${consumo_mensual_kwh} kWh ÷ 30\n      = ${e_dia.toFixed(3)} kWh/día`,
      explain: `Se divide el consumo mensual entre 30 días para obtener la energía promedio diaria. Este valor es la base de todo el dimensionamiento. Para mayor precisión, use el promedio de 3 meses de factura o el valor del mes de mayor consumo si desea cobertura total en picos.`,
      values: [["Consumo mensual", `${consumo_mensual_kwh} kWh/mes`, "entrada usuario"], ["E_día", `${e_dia.toFixed(3)} kWh/día`, "calculado"]],
    }
  });

  // ── PASO 3: Energía PV objetivo ───────────────────────────────────────────
  const e_pv = e_dia * porcentaje_cobertura;
  steps.push({
    num: 3, title: "Energía fotovoltaica objetivo (E_PV)",
    content: {
      formula: `E_PV = E_día × Cobertura\n     = ${e_dia.toFixed(3)} × ${porcentaje_cobertura} (${(porcentaje_cobertura*100).toFixed(0)}%)\n     = ${e_pv.toFixed(3)} kWh/día`,
      explain: `El porcentaje de cobertura define qué fracción del consumo se cubrirá con energía solar. Al 100% el sistema cubre toda la demanda en condiciones promedio. Al 80% se reduce el CAPEX pero se mantiene respaldo de red o generador. Para sistemas off-grid se recomienda 100%.`,
      values: [["Cobertura", `${(porcentaje_cobertura*100).toFixed(0)}%`, "entrada"], ["E_PV objetivo", `${e_pv.toFixed(3)} kWh/día`, "calculado"]],
    }
  });

  // ── PASO 4: Pérdidas y margen ─────────────────────────────────────────────
  let p_loss = (perdidas_manual !== "" && perdidas_manual !== undefined && perdidas_manual !== null) ? Number(perdidas_manual) : (tipo_sistema === "on-grid" ? 0.18 : 0.22);
  let margen = (margen_manual !== "" && margen_manual !== undefined && margen_manual !== null) ? Number(margen_manual) : 1.15;

  steps.push({
    num: 4, title: "Factor de pérdidas y margen de diseño",
    content: {
      formula: `P_loss = ${(p_loss*100).toFixed(1)}%  →  Factor rendimiento = ${(1-p_loss).toFixed(3)}\nMargen práctico (FD) = ${margen}`,
      explain: `Las pérdidas del sistema (P_loss) incluyen: polvo/suciedad en panel (~3%), degradación anual (~1%/año), pérdidas por temperatura (~5-8%), resistencia en cables (~2%), eficiencia del inversor/MPPT (~3-5%), y desajuste entre paneles (~1%). El margen práctico (FD=1.15 ≡ 15%) compensa incertidumbres de diseño, instalación subóptima y variabilidad climática. Para sistemas off-grid se aplica mayor pérdida (22%) por incluir pérdidas del banco de baterías (carga/descarga, conversión DC-DC).`,
      values: [["Tipo sistema", tipo_sistema, ""], ["Pérdidas totales", `${(p_loss*100).toFixed(1)}%`, perdidas_manual ? "manual" : "automático"], ["Margen FD", margen, margen_manual ? "manual" : "default 1.15"]],
    }
  });

  // ── PASO 5: kWp requerido ─────────────────────────────────────────────────
  const kwp_base = e_pv / (hsp * (1 - p_loss));
  const kwp_final = kwp_base * margen;
  steps.push({
    num: 5, title: "Potencia pico fotovoltaica requerida (kWp)",
    content: {
      formula: `kWp_base = E_PV / (HSP × (1 − P_loss))\n         = ${e_pv.toFixed(3)} / (${hsp} × (1 − ${p_loss.toFixed(3)}))\n         = ${e_pv.toFixed(3)} / ${(hsp*(1-p_loss)).toFixed(4)}\n         = ${kwp_base.toFixed(4)} kWp\n\nkWp_final = kWp_base × FD_margen\n          = ${kwp_base.toFixed(4)} × ${margen}\n          = ${kwp_final.toFixed(4)} kWp`,
      explain: `Esta es la fórmula fundamental del dimensionamiento FV. Divide la energía que el campo solar debe producir cada día entre la producción unitaria real (HSP ajustada por pérdidas). Representa los Watts pico mínimos que debe tener el generador fotovoltaico para satisfacer la demanda. El margen práctico asegura que ante cualquier desviación de los supuestos, el sistema siga siendo suficiente.`,
      values: [["kWp base (sin margen)", kwp_base.toFixed(4) + " kWp", "calculado"], ["kWp final (con margen)", kwp_final.toFixed(4) + " kWp", "diseño"]],
    }
  });

  // ── PASO 6: Panel seleccionado ────────────────────────────────────────────
  let panel, panel_source;
  if (advanced_mode && panel_wp_custom) {
    panel = { wp: Number(panel_wp_custom), voc: Number(panel_voc_custom), vmp: Number(panel_vmp_custom), imp: Number(panel_imp_custom), isc: Number(panel_isc_custom), coef_voc: Number(panel_coef_voc_custom), name: `Panel personalizado ${panel_wp_custom}Wp`, recommended: false };
    panel_source = "Datos STC ingresados manualmente en Modo Avanzado";
  } else {
    const cat_panel = selectBestPanel(kwp_final, catalog);
    if (cat_panel) {
      panel = cat_panel;
      panel_source = `Selección automática del catálogo — mejor relación costo/rendimiento`;
    } else {
      panel = recommendOptimalPanel(kwp_final);
      panel_source = "Recomendación automática — panel típico de mercado";
    }
    info.push({ type: "panel_rec", panel });
  }

  const n_paneles_exacto = (kwp_final * 1000) / panel.wp;
  const n_paneles = Math.ceil(n_paneles_exacto);
  const kwp_inst = (n_paneles * panel.wp) / 1000;

  steps.push({
    num: 6, title: "Selección de panel y número de módulos",
    content: {
      formula: `N_paneles = ⌈ (kWp_final × 1000) / Wp_panel ⌉\n          = ⌈ (${kwp_final.toFixed(4)} × 1000) / ${panel.wp} ⌉\n          = ⌈ ${n_paneles_exacto.toFixed(3)} ⌉\n          = ${n_paneles} paneles\n\nkWp instalado = ${n_paneles} × ${panel.wp} / 1000 = ${kwp_inst.toFixed(3)} kWp`,
      explain: `Se redondea siempre hacia ARRIBA (⌈ ⌉ = techo) para no quedar por debajo del kWp requerido. El kWp instalado final es ligeramente superior al calculado, lo cual es correcto y deseable. Panel seleccionado: ${panel.name} — ${panel_source}.`,
      values: [["Panel", panel.name, panel_source], ["Potencia panel", `${panel.wp} Wp`, "STC"], ["N paneles", `${n_paneles} unidades`, "diseño"], ["kWp instalado", `${kwp_inst.toFixed(3)} kWp`, "real"]],
    }
  });

  // ── PASO 7: Tensión banco ─────────────────────────────────────────────────
  let v_bat, v_justif, v_src;
  if (tension_banco_manual && tension_banco_manual !== "") {
    v_bat = Number(tension_banco_manual); v_src = "manual";
    v_justif = `Tensión definida manualmente: ${v_bat}V.`;
  } else if (e_dia > 3) {
    v_bat = 48; v_src = "automático";
    v_justif = `E_día = ${e_dia.toFixed(2)} kWh/día > 3 kWh → Se recomienda 48V. A mayor tensión, menor corriente (I = P/V), lo que reduce las pérdidas en cableado (∝ I²·R), permite cables de menor sección y mejora la eficiencia del sistema.`;
  } else if (e_dia >= 1) {
    v_bat = 24; v_src = "automático";
    v_justif = `E_día = ${e_dia.toFixed(2)} kWh/día entre 1–3 kWh → 24V es suficiente y equilibra costo vs pérdidas.`;
  } else {
    v_bat = 12; v_src = "automático";
    v_justif = `E_día = ${e_dia.toFixed(2)} kWh/día < 1 kWh → 12V viable para sistemas muy pequeños.`;
  }
  steps.push({
    num: 7, title: "Tensión del sistema (banco CC)",
    content: {
      formula: `V_banco = ${v_bat} V  (${v_src})\n\nJustificación técnica:\n${v_justif}`,
      explain: `La tensión del sistema define toda la arquitectura eléctrica: paneles, controlador, inversor y baterías deben ser compatibles. Una tensión alta reduce la corriente en cada conductor, disminuye las pérdidas óhmicas (P_pérd = I²·R) y permite usar cables más delgados. Para sistemas residenciales de más de 3 kWh/día, 48V es el estándar de la industria. La corriente de carga estimada a ${v_bat}V es: I = (${(kwp_inst*1000).toFixed(0)}W × 0.95) / ${v_bat}V = ${((kwp_inst*1000*0.95)/v_bat).toFixed(1)} A`,
      values: [["Tensión banco", `${v_bat} V`, v_src], ["Corriente de carga aprox.", `${((kwp_inst*1000*0.95)/v_bat).toFixed(1)} A`, "estimado"]],
    }
  });

  // ── PASO 8: Configuración strings ─────────────────────────────────────────
  const voc_frio = panel.voc * (1 + panel.coef_voc * (temp_min - 25));
  let mppt_voc_max = mppt_voc_max_custom && mppt_voc_max_custom !== "" ? Number(mppt_voc_max_custom) : 150;
  const voc_lim = mppt_voc_max * 0.90;
  const n_serie = Math.max(1, Math.floor(voc_lim / voc_frio));
  const n_par = Math.ceil(n_paneles / n_serie);
  const n_tot = n_serie * n_par;
  const voc_str = voc_frio * n_serie;
  const vmp_str = panel.vmp * n_serie;

  if (voc_str > mppt_voc_max * 0.95) warnings.push(`⚠️ Voc_string_frío (${voc_str.toFixed(1)}V) muy cercano al límite Voc_max del MPPT (${mppt_voc_max}V). Considere reducir N_serie o usar un MPPT con mayor Voc_max.`);

  steps.push({
    num: 8, title: "Configuración del arreglo (series × paralelos)",
    content: {
      formula: `1. Voc_panel_frío = Voc_STC × (1 + α_Voc × (T_min − 25))\n   = ${panel.voc} × (1 + (${panel.coef_voc}) × (${temp_min} − 25))\n   = ${panel.voc} × ${(1 + panel.coef_voc*(temp_min-25)).toFixed(5)}\n   = ${voc_frio.toFixed(3)} V\n\n2. Límite Voc MPPT (90% del máximo) = ${mppt_voc_max} × 0.90 = ${voc_lim.toFixed(1)} V\n\n3. N_serie_máx = ⌊ ${voc_lim.toFixed(1)} / ${voc_frio.toFixed(3)} ⌋ = ${n_serie}\n\n4. N_paralelo = ⌈ ${n_paneles} / ${n_serie} ⌉ = ${n_par}\n\n5. Total paneles = ${n_serie}S × ${n_par}P = ${n_tot}\n   Voc_string_frío = ${voc_frio.toFixed(2)} × ${n_serie} = ${voc_str.toFixed(1)} V  ✓\n   Vmp_string = ${panel.vmp} × ${n_serie} = ${vmp_str.toFixed(1)} V`,
      explain: `El coeficiente α_Voc (temperatura de Voc) es negativo: cuando la temperatura baja, el Voc del panel SUBE. En el día más frío del año, el Voc_string puede alcanzar valores peligrosos para el MPPT. Por eso se calcula siempre con la temperatura mínima histórica y se aplica un margen de seguridad del 10% (se usa solo el 90% del Voc_max del MPPT). Si no se sabe el Voc_max del controlador, se asume 150V como valor típico conservador, pero en Modo Avanzado puede ajustarlo al modelo exacto.`,
      values: [["Voc panel frío", `${voc_frio.toFixed(3)} V`, `a T=${temp_min}°C`], ["Configuración", `${n_serie}S × ${n_par}P`, "diseño"], ["Voc string frío", `${voc_str.toFixed(1)} V`, `< ${mppt_voc_max}V ✓`], ["Vmp string", `${vmp_str.toFixed(1)} V`, "punto de trabajo"]],
    }
  });

  // ── PASO 9: Dimensionado del controlador / MPPT ───────────────────────────
  const eta_mppt = 0.96;
  const i_carga = (kwp_inst * 1000 * eta_mppt) / v_bat;
  const i_imp_total = panel.imp * n_par;
  const i_mppt_req = Math.max(i_carga, i_imp_total) * 1.25;

  // Controller comparison
  const can_use_pwm = (v_bat === 12 || v_bat === 24) && kwp_inst < 0.8 && Math.abs(panel.vmp - v_bat) / v_bat < 0.3;
  const ctrl_options = {
    mppt_solo: {
      name: "Controlador MPPT independiente",
      suitable: true,
      i_req: i_mppt_req.toFixed(1),
      voc_req: voc_str.toFixed(1),
      pros: ["Mayor eficiencia (+20-30% vs PWM)","Trabaja con Vmp del panel (no requiere match con Vbat)","Estándar profesional recomendado","Funciona con cualquier combinación de strings"],
      cons: ["Costo mayor que PWM (~$680k-1.85M COP)","Requiere inversor externo"],
      cost_est: i_mppt_req > 80 ? 1850000 : i_mppt_req > 60 ? 1100000 : i_mppt_req > 40 ? 680000 : 420000,
      model: i_mppt_req > 80 ? "Victron SmartSolar 150/100" : i_mppt_req > 60 ? "Victron SmartSolar 150/60" : i_mppt_req > 40 ? "EPEver Tracer 4215BN 60A" : "EPEver Tracer 2215BN 30A",
      recommended: true,
    },
    pwm: {
      name: "Controlador PWM",
      suitable: can_use_pwm,
      pros: ["Precio más bajo (~$150k-250k COP)","Tecnología simple y robusta","Suficiente para sistemas <500W con baterías de plomo"],
      cons: ["Eficiencia 15-25% menor que MPPT","Vmp_panel DEBE ser similar a Vbat (~10% más alto)","No recomendado para sistemas con paneles modernos de alta Vmp","Solo viable a 12/24V y <500W"],
      cost_est: 200000,
      model: "Genérico 12/24V 20-40A",
      recommended: false,
    },
    hibrido: {
      name: "Inversor Híbrido c/MPPT integrado",
      suitable: tipo_sistema !== "on-grid",
      pros: ["Todo en uno: MPPT + cargador + inversor + gestión red","Menos equipos, menos cableado, más fácil de instalar","Muchos incluyen comunicación Wi-Fi y app móvil","Ideal para sistemas híbridos modernos"],
      cons: ["Costo total mayor (~$3.5M-7M COP)","Si falla, todo el sistema queda sin operación","Menos modular para ampliaciones futuras"],
      cost_est: 4200000,
      model: "Deye SUN-5K-SG03LP1 / Growatt SPH5000",
      recommended: tipo_sistema === "hibrido",
    }
  };

  steps.push({
    num: 9, title: "Dimensionado del controlador de carga / MPPT",
    content: {
      formula: `Corriente de carga al banco:\nI_carga = (P_PV × η_MPPT) / V_banco\n        = (${(kwp_inst*1000).toFixed(0)} W × ${eta_mppt}) / ${v_bat} V\n        = ${i_carga.toFixed(1)} A\n\nCorriente total de los paneles (Imp × Npar):\nI_imp_total = ${panel.imp} A × ${n_par} = ${i_imp_total.toFixed(1)} A\n\nCorriente MPPT requerida (con margen 25%):\nI_MPPT = max(${i_carga.toFixed(1)}, ${i_imp_total.toFixed(1)}) × 1.25\n       = ${Math.max(i_carga, i_imp_total).toFixed(1)} × 1.25\n       = ${i_mppt_req.toFixed(1)} A\n\nVoc_string_frío = ${voc_str.toFixed(1)} V  (debe ser < Voc_max_MPPT = ${mppt_voc_max} V)`,
      explain: `El controlador MPPT (Maximum Power Point Tracking) convierte la potencia del arreglo FV a la tensión del banco de baterías con alta eficiencia (>96%). Su corriente máxima de carga (A) y su voltaje máximo de entrada (Voc) son los parámetros clave de selección. Se aplica un factor de seguridad del 25% sobre la corriente para proteger el equipo de transitorios de irradiancia. A continuación se comparan las tres tecnologías de control posibles para este proyecto.`,
      values: [["I_carga", `${i_carga.toFixed(1)} A`, "por conversión"], ["I_imp_total", `${i_imp_total.toFixed(1)} A`, "por strings"], ["I_MPPT mínimo", `${i_mppt_req.toFixed(1)} A`, "con margen seg."], ["Voc_max requerido", `≥ ${voc_str.toFixed(1)} V`, "Voc string frío"]],
      ctrl_options
    }
  });

  // ── PASO 10: Banco baterías ───────────────────────────────────────────────
  let bat = null;
  if (tipo_sistema !== "on-grid") {
    const e_util = e_dia * dias_autonomia;
    const c_lifepo4 = e_util / (0.9 * 0.97);
    const c_gel = e_util / (0.5 * 0.85);
    const c_agm = e_util / (0.6 * 0.85);
    const ah_lifepo4 = (c_lifepo4 * 1000) / v_bat;
    const ah_gel = (c_gel * 1000) / v_bat;
    const n_pylo = Math.ceil(c_lifepo4 / 4.8);
    const n_gel_s = Math.max(1, Math.round(v_bat / 6));
    const n_gel_p = Math.ceil(ah_gel / 225);
    const n_gel = n_gel_s * n_gel_p;
    const n_agm_s = Math.max(1, Math.round(v_bat / 12));
    const n_agm_p = Math.ceil((c_agm * 1000 / v_bat) / 200);
    const n_agm = n_agm_s * n_agm_p;
    const tco_lifepo4 = n_pylo * 4200000;
    const tco_gel = n_gel * 420000 * 3;
    const tco_agm = n_agm * 350000 * 3;
    bat = { e_util, c_lifepo4, c_gel, c_agm, ah_lifepo4, ah_gel, n_pylo, n_gel, n_agm, n_gel_s, n_gel_p, n_agm_s, n_agm_p, tco_lifepo4, tco_gel, tco_agm, capex_lifepo4: n_pylo*4200000, capex_gel: n_gel*420000, capex_agm: n_agm*350000 };
    steps.push({
      num: 10, title: "Banco de baterías — capacidad y configuración",
      content: {
        formula: `Energía útil requerida:\nE_útil = E_día × Días_autonomía = ${e_dia.toFixed(3)} × ${dias_autonomia} = ${e_util.toFixed(3)} kWh\n\n[LiFePO4] DoD=90%, η_ciclo=97%:\nC_nom = E_útil / (DoD × η) = ${e_util.toFixed(3)} / (0.90 × 0.97) = ${c_lifepo4.toFixed(3)} kWh\nAh = C_nom×1000 / V_bat = ${c_lifepo4.toFixed(3)}×1000 / ${v_bat} = ${ah_lifepo4.toFixed(1)} Ah\nConfiguración: ${n_pylo} módulo(s) Pylontech US5000 (4.8kWh/48V)\n\n[Gel] DoD=50%, η_ciclo=85%:\nC_nom = ${e_util.toFixed(3)} / (0.50 × 0.85) = ${c_gel.toFixed(3)} kWh\nAh = ${c_gel.toFixed(3)}×1000 / ${v_bat} = ${ah_gel.toFixed(1)} Ah\nConfiguración: ${n_gel_p}P × ${n_gel_s}S Trojan T-105 6V 225Ah`,
        explain: `La capacidad nominal del banco debe sobrepasar la energía útil requerida, corregida por la profundidad de descarga (DoD) y la eficiencia de ciclo. DoD=90% en LiFePO4 significa que puede usar el 90% de su capacidad sin degradarla significativamente. En baterías de plomo-ácido (Gel/AGM), el DoD se limita al 50-60% para proteger la vida útil — descargar más profundo acelera la sulfatación de las placas. Siempre conecte módulos idénticos en paralelo y luego en serie para igualar la tensión.`,
        values: [["E_útil", `${e_util.toFixed(3)} kWh`, `${dias_autonomia} días autonomía`], ["LiFePO4 recomendado", `${c_lifepo4.toFixed(2)} kWh → ${n_pylo} módulos`, ""], ["Gel alternativa", `${c_gel.toFixed(2)} kWh → ${n_gel_s}S×${n_gel_p}P módulos`, ""]],
      }
    });
  }

  // ── PASO 11: Inversor ─────────────────────────────────────────────────────
  const p_inv = demanda_max_kw ? Number(demanda_max_kw) : Math.min(Math.max(kwp_inst * 1.25, 3), 8);
  const p_peak = p_inv * 2;
  steps.push({
    num: tipo_sistema !== "on-grid" ? 11 : 10, title: "Dimensionado del inversor",
    content: {
      formula: `P_continua_inv = max(kWp_inst × 1.25, 3 kW mínimo residencial)\n             = max(${kwp_inst.toFixed(2)} × 1.25, 3)\n             = max(${(kwp_inst*1.25).toFixed(2)}, 3)\n             = ${p_inv.toFixed(1)} kW\n\nP_pico_inv (arranque cargas inductivas) = ${p_inv.toFixed(1)} × 2 = ${p_peak.toFixed(1)} kW`,
      explain: `El inversor convierte la corriente continua (DC) del banco/paneles a corriente alterna (AC) para alimentar los equipos del hogar. La potencia continua determina cuánta carga simultánea puede manejar. La potencia pico (x2) cubre el arranque de motores (neveras, aires acondicionados, bombas) que demandan 3-6 veces su potencia nominal por 2-3 segundos. SIEMPRE use onda senoidal pura para equipos residenciales: protege televisores, motores, electrónica. La onda cuasi-senoidal (modificada) puede dañar equipos y es inadecuada para motores. Si no conoce la demanda máxima, ingrese el valor en kW de la factura en Modo Avanzado.`,
      values: [["P continua recomendada", `${p_inv.toFixed(1)} kW`, demanda_max_kw ? "dato factura" : "estimado"], ["P pico requerida", `${p_peak.toFixed(1)} kW`, "arranque inductivo"], ["Tipo onda", "Senoidal pura", "residencial obligatorio"]],
    }
  });

  // ── PASO 12: Cableado y protecciones ─────────────────────────────────────
  const rho = 0.0172, l_dc = 10;
  const s_raw = (2 * rho * l_dc * i_imp_total) / (0.03 * vmp_str);
  const s_norm = s_raw <= 4 ? 4 : s_raw <= 6 ? 6 : s_raw <= 10 ? 10 : s_raw <= 16 ? 16 : 25;
  const i_fuse = panel.isc * 1.25 * n_par;
  steps.push({
    num: tipo_sistema !== "on-grid" ? 12 : 11, title: "Cableado DC y protecciones eléctricas",
    content: {
      formula: `Sección cable DC (caída de tensión ≤ 3%, L_est=${l_dc}m):\nS = (2 × ρ_Cu × L × I) / (ΔV_max × V_mp_str)\n  = (2 × ${rho} × ${l_dc} × ${i_imp_total.toFixed(1)}) / (0.03 × ${vmp_str.toFixed(1)})\n  = ${s_raw.toFixed(3)} mm²  →  normalizado: ${s_norm} mm²\n\nFusibles por string:\nI_fuse = Isc_panel × 1.25 × N_paralelo = ${panel.isc} × 1.25 × ${n_par} = ${i_fuse.toFixed(1)} A\n→ Usar fusible de ${Math.ceil(i_fuse/5)*5} A (redondear al valor comercial superior)`,
      explain: `Cable DC: se usa cobre con ρ=0.0172 Ω·mm²/m. La caída de tensión máxima recomendada en DC es 3% para no reducir la potencia entregada. La longitud L=10m es una estimación típica panel→controlador; en instalaciones reales mida la distancia real y recalcule. Fusibles por string: protegen cada string de panel contra corriente de retro-alimentación en caso de fallo. Se dimensionan al 125% de Isc según NEC 690.8. El SPD (Protector de Sobretensión) es OBLIGATORIO en instalaciones con riesgo de rayo — en Colombia, exigido por RETIE. El interruptor DC desconecta el arreglo del controlador con seguridad.`,
      values: [["Sección cable DC", `${s_norm} mm² Cu`, "≤3% caída"], ["Fusibles por string", `${Math.ceil(i_fuse/5)*5} A`, "125% Isc"], ["SPD DC", "Cat. II mínimo", "RETIE obligatorio"], ["Interruptor DC", `≥${Math.ceil(i_imp_total*1.25/5)*5} A`, "desconexión segura"]],
    }
  });

  // ── PASO 13: Economía ─────────────────────────────────────────────────────
  const ah_mes = consumo_mensual_kwh * porcentaje_cobertura * precio_kwh_cop;
  const ah_ano = ah_mes * 12;
  const cp = n_tot * (panel.price || 270000);
  const cm = ctrl_options.mppt_solo.cost_est;
  const ci = p_inv >= 4 ? 5800000 : 2900000;
  const cb = bat ? bat.capex_lifepo4 : 0;
  const ce = Math.ceil(n_tot / 4) * 380000;
  const co = 800000;
  const cmob = (cp + cm + ci + co) * 0.18;
  const capex = cp + cm + ci + cb + ce + co + cmob;
  const payback = capex / ah_ano;
  const roi_10 = ((ah_ano * 10 - capex) / capex * 100);
  steps.push({
    num: tipo_sistema !== "on-grid" ? 13 : 12, title: "Análisis económico y rentabilidad",
    content: {
      formula: `Ahorro mensual = C_mensual × Cobertura × Tarifa\n             = ${consumo_mensual_kwh} kWh × ${porcentaje_cobertura} × $${precio_kwh_cop.toLocaleString("es-CO")}/kWh\n             = $${Math.round(ah_mes).toLocaleString("es-CO")} COP/mes\n\nAhorro anual = $${Math.round(ah_mes).toLocaleString("es-CO")} × 12 = $${Math.round(ah_ano).toLocaleString("es-CO")} COP\n\nCAPEX total:\n  Paneles (${n_tot}u) ........... $${cp.toLocaleString("es-CO")}\n  Controlador MPPT ........ $${cm.toLocaleString("es-CO")}\n  Inversor ................ $${ci.toLocaleString("es-CO")}\n  Baterías ................ $${cb.toLocaleString("es-CO")}\n  Estructura .............. $${ce.toLocaleString("es-CO")}\n  Cables y protecciones ... $${co.toLocaleString("es-CO")}\n  Mano de obra (18%) ...... $${Math.round(cmob).toLocaleString("es-CO")}\n  ─────────────────────────────────\n  TOTAL ................... $${Math.round(capex).toLocaleString("es-CO")} COP\n\nPayback simple = $${Math.round(capex).toLocaleString("es-CO")} / $${Math.round(ah_ano).toLocaleString("es-CO")} = ${payback.toFixed(1)} años\nROI a 10 años = ${roi_10.toFixed(1)}%`,
      explain: `El payback simple indica en cuántos años el ahorro acumulado recupera la inversión inicial. En Colombia, con tarifas residenciales entre $600-$1000/kWh, un sistema bien dimensionado tiene payback de 5-9 años para on-grid, y 8-14 años para off-grid (por el costo de baterías). La vida útil del sistema es 25+ años para paneles y 10-15 años para LiFePO4, lo que garantiza rentabilidad positiva. Las tarifas eléctricas en Colombia han aumentado ~8-12% anual en la última década, lo que mejora el ROI real frente al calculado con tarifa fija.`,
      values: [["Ahorro mensual", `$${Math.round(ah_mes).toLocaleString("es-CO")} COP`, "estimado"], ["Ahorro anual", `$${Math.round(ah_ano).toLocaleString("es-CO")} COP`, "estimado"], ["CAPEX total", `$${Math.round(capex).toLocaleString("es-CO")} COP`, "estimado"], ["Payback", `${payback.toFixed(1)} años`, "simple"], ["ROI 10 años", `${roi_10.toFixed(1)}%`, "sin inflación"]],
    }
  });

  return {
    inputs, steps, warnings, info,
    panel,
    ctrl_options,
    summary: {
      kwp_final: kwp_final.toFixed(3), kwp_inst: kwp_inst.toFixed(3),
      n_paneles: n_tot, n_serie, n_par,
      panel_name: panel.name, panel_wp: panel.wp,
      hsp, temp_min, v_bat,
      voc_str: voc_str.toFixed(1), vmp_str: vmp_str.toFixed(1),
      i_mppt_req: i_mppt_req.toFixed(1),
      p_inv: p_inv.toFixed(1), s_norm, i_fuse: i_fuse.toFixed(1),
      ah_mes: Math.round(ah_mes), ah_ano: Math.round(ah_ano),
      capex: Math.round(capex), payback: payback.toFixed(1),
      bat, ctrl: ctrl_options,
      capex_detail: { paneles: cp, mppt: cm, inversor: ci, baterias: cb, estructura: ce, otros: co, mano_obra: Math.round(cmob) },
    }
  };
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
const fmt = n => Number(n).toLocaleString("es-CO");
const fmtM = n => (Number(n)/1000000).toFixed(2) + "M";

function Tooltip({ text }) {
  return <span className="tooltip-icon">?<span className="tooltip-box">{text}</span></span>;
}

function Field({ label, hint, tooltip, children }) {
  return <div className="field">
    <div className="field-lbl">{label}{tooltip && <Tooltip text={tooltip}/>}</div>
    {children}
    {hint && <div className="field-hint">{hint}</div>}
  </div>;
}

function KPI({ val, unit, label, color }) {
  return <div className="kpi">
    <div className="kpi-val" style={color ? { color } : {}}>{val}</div>
    {unit && <div className="kpi-unit">{unit}</div>}
    <div className="kpi-lbl">{label}</div>
  </div>;
}

function Step({ step, defaultOpen }) {
  const [open, setOpen] = useState(defaultOpen || false);
  const c = step.content;
  return <div className="step">
    <div className="step-hdr" onClick={() => setOpen(o => !o)}>
      <div className="step-hdr-left">
        <div className="step-num">{step.num}</div>
        <div className="step-title">{step.title}</div>
      </div>
      <span style={{ color: "var(--text3)", fontSize: ".75rem" }}>{open ? "▲" : "▼"}</span>
    </div>
    {open && <div className="step-body">
      {c.explain && <div className="explain-box">ℹ️ {c.explain}</div>}
      {c.formula && <div className="formula-block" style={{ whiteSpace: "pre-wrap" }}>{c.formula}</div>}
      {c.values && c.values.length > 0 && <div style={{ marginTop: ".75rem" }}>
        <div style={{ fontSize: ".7rem", fontWeight: 600, color: "var(--text3)", textTransform: "uppercase", letterSpacing: ".06em", marginBottom: ".4rem" }}>Resumen de valores</div>
        {c.values.map(([k, v, s], i) => <div key={i} className="info-row">
          <span className="info-key">{k}</span>
          <span style={{ display: "flex", gap: ".5rem", alignItems: "center" }}>
            <span className="info-val">{v}</span>
            {s && <span style={{ fontSize: ".68rem", color: "var(--text3)" }}>{s}</span>}
          </span>
        </div>)}
      </div>}
      {c.ctrl_options && <CtrlCompare opts={c.ctrl_options} />}
    </div>}
  </div>;
}

function CtrlCompare({ opts }) {
  const recommended = Object.values(opts).find(o => o.recommended);
  const conclusions = {
    "MPPT Solo": `El controlador MPPT independiente es la opción óptima para este proyecto. Al separar las funciones de control de carga y conversión AC, se maximiza la flexibilidad: puede reemplazar el inversor sin cambiar el controlador (y viceversa), y permite monitoreo independiente de cada etapa. El MPPT realiza seguimiento del Punto de Máxima Potencia de los paneles en tiempo real, extrayendo hasta un 30% más energía que un controlador PWM convencional, especialmente en días nublados o con variaciones de temperatura. Para sistemas off-grid e híbridos medianos/grandes en Colombia, donde la radiación varía significativamente entre épocas secas y lluviosas, el MPPT solo es la configuración más eficiente y serviciable. Asegúrese de que la tensión Voc del string en frío no supere el límite máximo de entrada del controlador (con margen del 15% por RETIE Art. 30).`,
    "Inversor-Cargador MPPT": `El inversor-cargador todo-en-uno es la solución óptima para este proyecto. Al integrar inversor senoidal, controlador MPPT y cargador de baterías en un solo equipo, se reduce la complejidad del cableado, se minimiza el espacio de instalación y se centraliza el monitoreo. Equipos como Victron MultiPlus, Growatt SPF o Voltronic Axpert ofrecen protocolos de comunicación BMS para baterías LiFePO4, gestión de prioridades (solar/batería/red) y transferencia automática en menos de 20ms. Para proyectos colombianos con cargas sensibles (equipos médicos, refrigeración, telecomunicaciones) o donde el espacio de instalación es limitado, esta configuración garantiza mayor confiabilidad operativa. Cumple con RETIE para equipos de conversión de energía con certificación IEC 62109.`,
    "Híbrido On-Grid": `El inversor híbrido on-grid es la alternativa recomendada para este sistema. Permite operar conectado a la red eléctrica con inyección de excedentes (Ley 1715 de 2014 y Resolución CREG 030 de 2018), mientras mantiene respaldo en baterías para cortes de suministro. Esta configuración es ideal para usuarios con tarifas de energía elevadas que quieren reducir la factura sin perder la seguridad del suministro de red. La gestión inteligente de energía optimiza el autoconsumo: prioriza el consumo solar durante el día, carga baterías con excedentes, y vende a la red solo el sobrante. Para la legalización ante la distribuidora local, debe tramitar el Registro Único de Autogeneradores ante la UPME y cumplir con la medición bidireccional.`
  };
  const conclusionText = recommended ? (conclusions[recommended.name] || `El controlador ${recommended.name} (${recommended.model}) es la opción recomendada para este sistema según los parámetros calculados. Verifique que la tensión Voc del string en frío no supere el límite máximo de entrada del controlador, con un margen de seguridad del 15% según RETIE. Instale fusibles de protección en cada string y un SPD tipo 2 en el lado DC.`) : "";

  return <div style={{ marginTop: "1rem" }}>
    <div style={{ fontSize: ".75rem", fontWeight: 700, color: "var(--text)", marginBottom: ".65rem", textTransform: "uppercase", letterSpacing: ".06em" }}>📊 Comparativa de tecnologías de control</div>
    <div className="ctrl-grid">
      {Object.values(opts).map(o => <div key={o.name} className={`ctrl-card ${o.recommended ? "recommended" : ""}`}>
        <div className="ctrl-title">
          {o.recommended ? "⭐" : o.suitable ? "✓" : "✗"}
          <span style={{ color: o.recommended ? "var(--accent-dark)" : o.suitable ? "var(--green)" : "var(--text3)" }}>{o.name}</span>
        </div>
        {o.suitable ? <>
          <div style={{ fontSize: ".75rem", marginBottom: ".35rem" }}><span className="tag tag-amber">{o.model}</span></div>
          <div style={{ fontSize: ".72rem", color: "var(--text2)", marginBottom: ".25rem" }}>CAPEX est: <span style={{ fontFamily: "var(--mono)", fontWeight: 700 }}>${fmt(o.cost_est)}</span></div>
          <div className="pros-cons">
            {o.pros.map((p, i) => <div key={i} className="pro">✓ {p}</div>)}
            {o.cons.map((c, i) => <div key={i} className="con">✗ {c}</div>)}
          </div>
        </> : <div style={{ fontSize: ".78rem", color: "var(--text3)", marginTop: ".35rem" }}>No recomendado para este proyecto por las características del sistema.</div>}
      </div>)}
    </div>
    {conclusionText && <div className="alert alert-info" style={{ marginTop: ".85rem" }}>
      💡 <strong>Conclusión técnica — {recommended?.name} ({recommended?.model}):</strong> {conclusionText}
    </div>}
  </div>;
}

// ── CHARTS COMPONENTS ─────────────────────────────────────────────────────────
function SolarCharts({ summary, theme }) {
  const genRef = useRef(null);
  const paybackRef = useRef(null);
  const capexRef = useRef(null);
  const chartsRef = useRef({});

  const MONTHS = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const HSP_MONTHLY_FACTOR = [0.88,0.92,1.02,1.05,1.03,0.97,1.00,1.02,1.00,0.96,0.90,0.85];

  useEffect(() => {
    if (!summary) return;
    const kwpInst = parseFloat(summary.kwp_inst);
    const hsp = parseFloat(summary.hsp);
    const capex = parseFloat(summary.capex);
    const ahAno = parseFloat(summary.ah_ano);
    const payback = parseFloat(summary.payback);
    const cd = summary.capex_detail || {};
    const isDark = theme === "dark";
    const gridColor = isDark ? "rgba(255,255,255,.07)" : "rgba(0,0,0,.06)";
    const textColor = isDark ? "#8b949e" : "#64748b";
    const accentColor = "#f59e0b";

    // Destroy existing charts
    Object.values(chartsRef.current).forEach(c => { try { c.destroy(); } catch(e){} });
    chartsRef.current = {};

    // Chart 1: Monthly generation
    if (genRef.current) {
      const genData = MONTHS.map((m, i) => +(kwpInst * hsp * HSP_MONTHLY_FACTOR[i] * 30 * 0.78).toFixed(0));
      const consumo = Array(12).fill(+(parseFloat(summary.inputs?.consumo_mensual_kwh || 150)));
      chartsRef.current.gen = new Chart(genRef.current, {
        type: "bar",
        data: {
          labels: MONTHS,
          datasets: [
            { label: "Generación solar (kWh)", data: genData, backgroundColor: "rgba(245,158,11,.75)", borderColor: accentColor, borderWidth: 1, borderRadius: 4 },
            { label: "Consumo (kWh)", data: consumo, type: "line", borderColor: "#3b82f6", backgroundColor: "rgba(59,130,246,.12)", borderWidth: 2, pointRadius: 3, tension: 0.4, fill: true }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: textColor, font: { size: 11 } } } }, scales: { x: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor } }, y: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor }, title: { display: true, text: "kWh/mes", color: textColor, font: { size: 10 } } } } }
      });
    }

    // Chart 2: Payback / Cash flow acumulado
    if (paybackRef.current) {
      const years = Array.from({length:16},(_,i)=>i);
      const cashflow = years.map(y => Math.round(-capex + ahAno * y));
      const colors = cashflow.map(v => v >= 0 ? "rgba(5,150,105,.75)" : "rgba(220,38,38,.65)");
      chartsRef.current.pb = new Chart(paybackRef.current, {
        type: "bar",
        data: {
          labels: years.map(y => `Año ${y}`),
          datasets: [
            { label: "Flujo acumulado (COP)", data: cashflow, backgroundColor: colors, borderRadius: 3 },
            { label: "Break-even", data: Array(16).fill(0), type: "line", borderColor: "#f59e0b", borderWidth: 2, borderDash: [5,3], pointRadius: 0 }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: textColor, font: { size: 11 } } } }, scales: { x: { ticks: { color: textColor, font: { size: 9 }, maxRotation: 45 }, grid: { color: gridColor } }, y: { ticks: { color: textColor, font: { size: 10 }, callback: v => v>=1e6?`${(v/1e6).toFixed(1)}M`:v>=1e3?`${(v/1e3).toFixed(0)}k`:v }, grid: { color: gridColor } } } }
      });
    }

    // Chart 3: CAPEX breakdown donut
    if (capexRef.current) {
      const items = Object.entries({
        "Paneles": cd.paneles||0, "MPPT": cd.mppt||0, "Inversor": cd.inversor||0,
        "Baterías": cd.baterias||0, "Estructura": cd.estructura||0,
        "Cables/otros": cd.otros||0, "Mano de obra": cd.mano_obra||0
      }).filter(([,v])=>v>0);
      chartsRef.current.capex = new Chart(capexRef.current, {
        type: "doughnut",
        data: {
          labels: items.map(([k])=>k),
          datasets: [{ data: items.map(([,v])=>v), backgroundColor: ["#f59e0b","#3b82f6","#8b5cf6","#10b981","#f97316","#64748b","#ec4899"], borderWidth: 2, borderColor: isDark?"#161b22":"#fff" }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: "right", labels: { color: textColor, font: { size: 10 }, boxWidth: 12 } }, tooltip: { callbacks: { label: ctx => ` ${ctx.label}: $${fmt(ctx.raw)} (${((ctx.raw/capex)*100).toFixed(1)}%)` } } } }
      });
    }

    return () => { Object.values(chartsRef.current).forEach(c => { try { c.destroy(); } catch(e){} }); };
  }, [summary, theme]);

  return <div>
    <div className="card">
      <div className="card-hdr"><span className="card-title">☀️ Curva de generación mensual vs consumo</span></div>
      <div className="chart-container"><canvas ref={genRef} /></div>
    </div>
    <div className="chart-grid">
      <div className="card">
        <div className="card-hdr"><span className="card-title">📈 Flujo de caja acumulado (15 años)</span></div>
        <div className="chart-container" style={{height:220}}><canvas ref={paybackRef} /></div>
      </div>
      <div className="card">
        <div className="card-hdr"><span className="card-title">🥧 Distribución CAPEX</span></div>
        <div className="chart-container" style={{height:220}}><canvas ref={capexRef} /></div>
      </div>
    </div>
  </div>;
}

  const [editing, setEditing] = useState(null);
  const blank = { type: "panel", name: "", brand: "", wp: "", vmp: "", voc: "", imp: "", isc: "", coef_voc: -0.0028, kwh: "", voltage: 48, chemistry: "LiFePO4", dod: 0.9, cycles: 6000, kw: "", max_pv_voltage: 150, max_charge_current: 100, mppt_included: false, mppt_current: "", mppt_voltage: "", price: "", weight: "", stock: 0, supplier_url: "" };
  const [form, setForm] = useState(blank);
  const sf = (k, v) => setForm(f => ({ ...f, [k]: v }));

  return <div>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: ".75rem" }}>

      </div>
      <button className="btn btn-primary" onClick={() => { setEditing(null); setForm(blank); setShowForm(true); }}>+ Añadir</button>
    </div>

    {showForm && <div className="card" style={{ marginBottom: "1rem" }}>
      <div className="card-hdr">

      </div>
      <div className="two-col">
        <Field label="Tipo"><select value={form.type} onChange={e => sf("type", e.target.value)}><option value="panel">Panel</option><option value="mppt">MPPT</option><option value="battery">Batería</option><option value="inverter">Inversor</option><option value="structure">Estructura</option></select></Field>

        <Field label="Peso (kg)"><input type="number" value={form.weight} onChange={e => sf("weight", e.target.value)} /></Field>
        <Field label="Stock"><input type="number" value={form.stock} onChange={e => sf("stock", e.target.value)} /></Field>
        {form.type === "panel" && <>
          <Field label="Wp"><input type="number" value={form.wp} onChange={e => sf("wp", e.target.value)} /></Field>
          <Field label="Voc STC (V)"><input type="number" value={form.voc} onChange={e => sf("voc", e.target.value)} step=".1" /></Field>
          <Field label="Vmp (V)"><input type="number" value={form.vmp} onChange={e => sf("vmp", e.target.value)} step=".1" /></Field>

        </>}

          <Field label="kWh"><input type="number" value={form.kwh} onChange={e => sf("kwh", e.target.value)} /></Field>

          <Field label="Ciclos"><input type="number" value={form.cycles} onChange={e => sf("cycles", e.target.value)} /></Field>
        </>}

          <Field label="Voc máx entrada (V)"><input type="number" value={form.max_pv_voltage} onChange={e => sf("max_pv_voltage", e.target.value)} /></Field>

        </>}
        {form.type === "inverter" && <>

      </div>

    <div style={{ overflowX: "auto" }}>

              {item.type === "inverter" && `${item.kw}kW | ${item.voltage}V${item.mppt_included ? " | MPPT integrado" : ""}`}

              <button className="btn btn-danger" style={{ padding: ".25rem .45rem", fontSize: ".7rem" }} onClick={() => setCatalog(c => c.filter(i => i.id !== item.id))}>🗑</button>

      </table>
    </div>
  </div>;

function ConsumoView({ appliances, setAppliances, onApply }) {
  const [cat, setCat] = React.useState(COMMON_APP[0].cat);
  const [item, setItem] = React.useState(COMMON_APP[0].items[0].n);
  const [itemW, setItemW] = React.useState(COMMON_APP[0].items[0].w);

  const changeCat = (c) => {
    const found = COMMON_APP.find(x => x.cat === c);
    setCat(c);
    setItem(found.items[0].n);
    setItemW(found.items[0].w);
  };
  const changeItem = (n) => {
    const found = (COMMON_APP.find(x => x.cat === cat) || {items:[]}).items.find(i => i.n === n);
    setItem(n);
    setItemW(found ? found.w : 0);
  };
  const addFromCatalog = () => setAppliances(prev => [...prev, { id: Date.now(), name: item, watts: itemW, qty: 1, hours: 4, days: 7 }]);
  const addCustom = () => setAppliances(prev => [...prev, { id: Date.now(), name: "Nuevo equipo", watts: 100, qty: 1, hours: 4, days: 7 }]);
  const updRow = (id, field, val) => setAppliances(prev => prev.map(a => a.id !== id ? a : { ...a, [field]: ["watts","qty","hours","days"].includes(field) ? parseFloat(val)||0 : val }));
  const delRow = (id) => setAppliances(prev => prev.filter(a => a.id !== id));

  const rowKwh = (a) => (a.watts * a.qty * a.hours * a.days * 4.345) / 1000;
  const totalKwh = appliances.reduce((s, a) => s + rowKwh(a), 0);
  const totalW   = appliances.reduce((s, a) => s + a.watts * a.qty, 0);
  const kwhDay   = totalKwh / 30;
  const top      = appliances.length ? [...appliances].sort((a,b) => rowKwh(b)-rowKwh(a))[0] : null;

  return (
    <div className="consumo-view">
      <div className="consumo-hero">
        <div className="consumo-hero-text">
          <h2>⚡ Calculadora de Consumo Eléctrico</h2>
          <p>Registre los electrodomésticos, horas de uso y días por semana para estimar el consumo mensual. Luego aplíquelo directamente al calculador solar con un clic.</p>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontFamily:"var(--mono)",fontSize:"2rem",fontWeight:800,color:"#fff"}}>{totalKwh.toFixed(1)}</div>
          <div style={{fontSize:".8rem",color:"rgba(255,255,255,.7)"}}>kWh / mes</div>
        </div>
      </div>

      <div className="consumo-kpi-row">
        {[
          {v:totalKwh.toFixed(1), u:"kWh/mes",  l:"Consumo total",         c:"var(--green)"},
          {v:kwhDay.toFixed(2),   u:"kWh/día",  l:"Promedio diario",       c:"var(--blue)"},
          {v:totalW.toLocaleString("es-CO"), u:"W", l:"Potencia instalada total", c:"var(--accent)"},
          {v:top ? top.name.slice(0,20)+(top.name.length>20?"…":"") : "—", u:"", l:"Mayor consumidor", c:"var(--purple)"},
        ].map((k,i) => (
          <div key={i} className="consumo-kpi">
            <div className="consumo-kpi-val" style={{color:k.c, fontSize:i===3?".82rem":"1.35rem"}}>{k.v}</div>
            {k.u && <div className="consumo-kpi-unit">{k.u}</div>}
            <div className="consumo-kpi-lbl">{k.l}</div>
          </div>
        ))}
      </div>

      <div className="card">
        <div className="card-hdr"><span className="card-title">Agregar desde catálogo</span></div>
        <div className="quick-add">
          <select className="asel" value={cat} onChange={e => changeCat(e.target.value)}>
            {COMMON_APP.map(c => <option key={c.cat} value={c.cat}>{c.cat}</option>)}
          </select>
          <select className="asel" style={{minWidth:220}} value={item} onChange={e => changeItem(e.target.value)}>
            {(COMMON_APP.find(c => c.cat === cat)||{items:[]}).items.map(it => (
              <option key={it.n} value={it.n}>{it.n} ({it.w} W)</option>
            ))}
          </select>
          <button className="btn btn-green" onClick={addFromCatalog}>+ Agregar</button>
          <button className="btn btn-secondary" onClick={addCustom}>+ Personalizado</button>
          {appliances.length > 0 && <button className="btn btn-danger" style={{marginLeft:"auto"}} onClick={() => setAppliances([])}>🗑 Limpiar todo</button>}
        </div>
      </div>

      <div className="card">
        <div className="card-hdr">
          <span className="card-title">📋 Lista de electrodomésticos</span>
          <span style={{fontSize:".75rem",color:"var(--text3)"}}>{appliances.length} elemento{appliances.length!==1?"s":""}</span>
        </div>
        {appliances.length === 0 ? (
          <div style={{textAlign:"center",padding:"2.5rem",color:"var(--text3)"}}>
            <div style={{fontSize:"2.5rem",marginBottom:".75rem",opacity:.4}}>🔌</div>
            <div style={{fontSize:".9rem",fontWeight:600,marginBottom:".4rem",color:"var(--text2)"}}>Sin electrodomésticos</div>
            <p style={{fontSize:".8rem"}}>Use el catálogo o agregue uno personalizado.</p>
          </div>
        ) : (
          <div style={{overflowX:"auto"}}>
            <table className="app-tbl">
              <thead>
                <tr>
                  <th style={{minWidth:180}}>Electrodoméstico</th>
                  <th style={{width:95}}>Potencia (W)</th>
                  <th style={{width:65}}>Cant.</th>
                  <th style={{width:90}}>Horas/día</th>
                  <th style={{width:90}}>Días/sem.</th>
                  <th style={{width:105,textAlign:"right",paddingRight:".75rem"}}>kWh/mes</th>
                  <th style={{width:36}}></th>
                </tr>
              </thead>
              <tbody>
                {appliances.map(a => (
                  <tr key={a.id}>
                    <td><input className="ainput" type="text" value={a.name} onChange={e => updRow(a.id,"name",e.target.value)} /></td>
                    <td><input className="ainput ainput-num" type="number" min="1" value={a.watts} onChange={e => updRow(a.id,"watts",e.target.value)} /></td>
                    <td><input className="ainput ainput-num" type="number" min="1" value={a.qty} onChange={e => updRow(a.id,"qty",e.target.value)} /></td>
                    <td><input className="ainput ainput-num" type="number" min="0.1" max="24" step="0.5" value={a.hours} onChange={e => updRow(a.id,"hours",e.target.value)} /></td>
                    <td><input className="ainput ainput-num" type="number" min="1" max="7" value={a.days} onChange={e => updRow(a.id,"days",e.target.value)} /></td>
                    <td className="kwh-col">{rowKwh(a).toFixed(2)}</td>
                    <td><button className="btn btn-danger" style={{padding:".2rem .35rem",fontSize:".7rem"}} onClick={() => delRow(a.id)}>✕</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {appliances.length > 0 && (
          <div className="consumo-footer">
            <div>
              <div style={{fontSize:".82rem",fontWeight:600,color:"var(--text2)",marginBottom:".2rem"}}>Consumo mensual total estimado</div>
              <div style={{fontSize:".72rem",color:"var(--text3)"}}>{appliances.length} equipo(s) · fórmula: W × Cant. × h/día × días/sem × 4.345 ÷ 1000</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"1.5rem"}}>
              <div style={{textAlign:"right"}}>
                <div className="consumo-total-val">{totalKwh.toFixed(1)} <span style={{fontSize:".9rem"}}>kWh/mes</span></div>
                <div style={{fontSize:".72rem",color:"var(--text3)"}}>≈ {kwhDay.toFixed(2)} kWh/día</div>
              </div>
              <button className="btn btn-green" style={{padding:".65rem 1.25rem",fontSize:".85rem",fontWeight:700}} onClick={() => onApply(Math.round(totalKwh))}>
                ⚡ Aplicar al calculador
              </button>
            </div>
          </div>
        )}
      </div>

      {appliances.length > 0 && (
        <div className="alert alert-info" style={{marginTop:".5rem"}}>
          💡 <strong>Tip:</strong> Al presionar <strong>"Aplicar al calculador"</strong> el valor se transfiere al campo <em>Consumo mensual</em> y se abre la calculadora lista para calcular. También puede ingresar el valor manualmente si tiene la factura eléctrica del cliente.
        </div>
      )}
    </div>
  );
}

  // New state

  const [sbStatus, setSbStatus] = useState("idle"); // idle | saving | loading | error | ok

  const [appliances, setAppliances] = React.useState([
    { id: 1, name: "Refrigerador/Nevera", watts: 150, qty: 1, hours: 24, days: 7 },
    { id: 2, name: "Televisor LED 43\"", watts: 80, qty: 1, hours: 6, days: 7 },

  ]);
  const [form, setForm] = useState({
    nombre_proyecto: "", nombre_cliente: "",
    consumo_mensual_kwh: 150, precio_kwh_cop: 800,
    region: "Bogotá", tipo_sistema: "off-grid",
    porcentaje_cobertura: 1.0, dias_autonomia: 2,
